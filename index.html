<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Quản Lý Bệnh Nhân - EMR Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Nâng cấp: Thêm Chart.js cho biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0d9488', 
                        secondary: '#0f766e', 
                        accent: '#f43f5e', 
                        surface: '#f8fafc', 
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .nav-item.active { background-color: #e0f2fe; color: #0369a1; border-right: 4px solid #0284c7; }
        .tab-btn.active { border-bottom: 2px solid #0d9488; color: #0d9488; font-weight: 600; }
        
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-enter { animation: modalEnter 0.2s ease-out forwards; }
        @keyframes modalEnter { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .action-group { opacity: 0; transition: opacity 0.2s ease; }
        @media (max-width: 768px) { .action-group { opacity: 1; } }
        .hover-reveal-container:hover .action-group { opacity: 1; }

        .filter-pill.active { background-color: #0d9488; color: white; border-color: #0d9488; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <div id="mobile-sidebar-backdrop" class="fixed inset-0 bg-slate-900/50 z-40 hidden md:hidden" onclick="ui.closeSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out bg-white border-r border-slate-200 flex flex-col shadow-2xl md:shadow-sm">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100">
            <div class="flex items-center cursor-pointer hover:bg-slate-50 transition-colors" onclick="app.navigate('dashboard')">
                <i class="fa-solid fa-hospital-user text-primary text-2xl mr-3"></i>
                <span class="font-bold text-lg tracking-tight text-slate-800">MediCare Pro</span>
            </div>
            <button class="md:hidden text-slate-400 hover:text-rose-500 p-2" onclick="ui.closeSidebar()"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <nav class="flex-1 py-4 overflow-y-auto">
            <ul class="space-y-1">
                <li><a onclick="app.navigate('dashboard')" id="nav-dashboard" class="nav-item active flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li><a onclick="app.navigate('patients')" id="nav-patients" class="nav-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"><i class="fa-solid fa-users w-6"></i> Quản Lý Bệnh Nhân</a></li>
                <li><a onclick="app.navigate('appointments')" id="nav-appointments" class="nav-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"><i class="fa-regular fa-calendar-check w-6"></i> Quản Lý Lịch Hẹn</a></li>
                <li><a onclick="app.navigate('billing')" id="nav-billing" class="nav-item flex items-center px-6 py-3 text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer"><i class="fa-solid fa-file-invoice-dollar w-6"></i> Quản Lý Viện Phí</a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-slate-100">
            <button onclick="app.openAddPatient()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Thêm Bệnh Nhân Nhanh
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative overflow-hidden bg-slate-50">
        <header class="md:hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 z-20 shadow-sm shrink-0">
            <div class="flex items-center cursor-pointer" onclick="app.navigate('dashboard')">
                <i class="fa-solid fa-hospital-user text-primary text-xl mr-2"></i>
                <span class="font-bold text-slate-800">MediCare Pro</span>
            </div>
            <button class="text-slate-500 p-2 focus:outline-none" onclick="ui.toggleSidebar()"><i class="fa-solid fa-bars text-2xl"></i></button>
        </header>

        <div id="view-dashboard" class="view-section p-4 md:p-8 overflow-y-auto h-full fade-in block"></div>
        <div id="view-patients" class="view-section p-4 md:p-8 overflow-y-auto h-full fade-in hidden"></div>
        <div id="view-appointments" class="view-section p-4 md:p-8 overflow-y-auto h-full fade-in hidden"></div>
        <div id="view-billing" class="view-section p-4 md:p-8 overflow-y-auto h-full fade-in hidden"></div>
        <div id="view-patient-detail" class="view-section p-0 overflow-y-auto h-full fade-in hidden"></div>
    </main>

    <!-- Modal Thêm/Sửa Bệnh Nhân -->
    <div id="modal-patient" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg modal-enter overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                <h3 id="modal-patient-title" class="font-bold text-lg text-slate-800">Thêm Bệnh Nhân Mới</h3>
                <button onclick="ui.closeModal('modal-patient')" class="text-slate-400 hover:text-rose-500 transition-colors p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="form-patient" class="space-y-4">
                    <input type="hidden" id="inp_p_id">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Mã BN <span class="text-rose-500">*</span></label>
                            <input type="text" id="inp_p_code" required placeholder="Vd: BN0001" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Họ và Tên <span class="text-rose-500">*</span></label>
                            <input type="text" id="inp_p_name" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-base">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Giới tính</label>
                            <select id="inp_p_gender" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                                <option value="Nam">Nam</option><option value="Nữ">Nữ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Ngày sinh</label>
                            <input type="date" id="inp_p_dob" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Số điện thoại</label>
                            <input type="tel" id="inp_p_phone" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nhóm máu</label>
                            <select id="inp_p_blood" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                                <option value="Chưa rõ">Chưa rõ</option><option value="A+">A+</option><option value="B+">B+</option><option value="O+">O+</option><option value="AB+">AB+</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Chẩn đoán nền</label>
                        <input type="text" id="inp_p_diag" placeholder="Vd: Tăng huyết áp..." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Phân loại Rủi ro</label>
                        <select id="inp_p_risk" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base">
                            <option value="Low">Low (An toàn)</option><option value="Medium">Medium (Trung bình)</option><option value="High">High (Nguy cơ cao)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="ui.closeModal('modal-patient')" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100">Hủy</button>
                <button onclick="app.savePatient()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-secondary shadow-sm">Lưu Hồ Sơ</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Lượt Khám -->
    <div id="modal-visit" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg modal-enter overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-teal-50 shrink-0">
                <h3 id="modal-visit-title" class="font-bold text-lg text-teal-800"><i class="fa-solid fa-stethoscope mr-2"></i>Phiên Khám</h3>
                <button onclick="ui.closeModal('modal-visit')" class="text-slate-400 hover:text-rose-500 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="form-visit" class="space-y-4">
                    <input type="hidden" id="inp_v_id">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ngày Khám</label>
                        <input type="date" id="inp_v_date" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary bg-slate-50 text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lý do khám (Chief Complaint) <span class="text-rose-500">*</span></label>
                        <textarea id="inp_v_complaint" rows="2" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Đánh giá lâm sàng (Assessment)</label>
                        <textarea id="inp_v_assessment" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kế hoạch điều trị (Plan)</label>
                        <textarea id="inp_v_plan" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary text-base"></textarea>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="ui.closeModal('modal-visit')" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100">Hủy</button>
                <button onclick="app.saveVisit()" class="px-4 py-2 bg-primary text-white rounded-md hover:bg-secondary shadow-sm">Lưu Phiên Khám</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Đơn Thuốc -->
    <div id="modal-medication" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg modal-enter overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-purple-50 shrink-0">
                <h3 id="modal-med-title" class="font-bold text-lg text-purple-800"><i class="fa-solid fa-capsules mr-2"></i>Kê Đơn Thuốc</h3>
                <button onclick="ui.closeModal('modal-medication')" class="text-slate-400 hover:text-rose-500 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="form-med" class="space-y-4">
                    <input type="hidden" id="inp_m_id">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tên Thuốc (Hoạt chất) <span class="text-rose-500">*</span></label>
                        <input type="text" id="inp_m_name" required placeholder="Vd: Amlodipine 5mg" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-base">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Đường dùng</label>
                            <select id="inp_m_route" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-base">
                                <option value="Uống">Uống</option><option value="Tiêm">Tiêm</option><option value="Bôi">Bôi</option><option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tần suất</label>
                            <input type="text" id="inp_m_freq" placeholder="Vd: 1 viên Sáng" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-base">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Trạng thái</label>
                        <select id="inp_m_status" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-base">
                            <option value="Active">Đang dùng</option><option value="Stopped">Đã ngưng</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ghi chú (Tùy chọn)</label>
                        <input type="text" id="inp_m_note" placeholder="Vd: Uống sau ăn..." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500 text-base">
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="ui.closeModal('modal-medication')" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100">Hủy</button>
                <button onclick="app.saveMedication()" class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 shadow-sm">Lưu Thuốc</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Lịch Hẹn -->
    <div id="modal-appointment" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md modal-enter overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-blue-50 shrink-0">
                <h3 id="modal-appointment-title" class="font-bold text-lg text-blue-800"><i class="fa-regular fa-calendar-plus mr-2"></i>Lịch Hẹn</h3>
                <button onclick="ui.closeModal('modal-appointment')" class="text-slate-400 hover:text-rose-500 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="form-appointment" class="space-y-4">
                    <input type="hidden" id="inp_a_id">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Bệnh Nhân <span class="text-rose-500">*</span></label>
                        <select id="inp_a_patient" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-base"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ngày Hẹn <span class="text-rose-500">*</span></label>
                        <input type="date" id="inp_a_date" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mục đích hẹn</label>
                        <input type="text" id="inp_a_purpose" required placeholder="Vd: Tái khám định kỳ..." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-base">
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="ui.closeModal('modal-appointment')" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100">Hủy</button>
                <button onclick="app.saveAppointment()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm">Lưu Lịch Hẹn</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Hóa Đơn (Nâng cấp) -->
    <div id="modal-invoice" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg modal-enter overflow-hidden flex flex-col max-h-full">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-orange-50 shrink-0">
                <h3 id="modal-invoice-title" class="font-bold text-lg text-orange-800"><i class="fa-solid fa-file-invoice-dollar mr-2"></i>Hóa Đơn Viện Phí</h3>
                <button onclick="ui.closeModal('modal-invoice')" class="text-slate-400 hover:text-rose-500 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="form-invoice" class="space-y-4">
                    <input type="hidden" id="inp_i_id">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Bệnh Nhân <span class="text-rose-500">*</span></label>
                        <select id="inp_i_patient" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 bg-slate-50 text-base"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Ngày Lập</label>
                            <input type="date" id="inp_i_date" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tổng Tiền (VNĐ) <span class="text-rose-500">*</span></label>
                            <input type="number" id="inp_i_amount" required min="0" step="1000" placeholder="Vd: 500000" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 text-base">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nội dung thu <span class="text-rose-500">*</span></label>
                        <input type="text" id="inp_i_desc" required placeholder="Vd: Phí khám bệnh, xét nghiệm..." class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 text-base">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Trạng thái</label>
                        <select id="inp_i_status" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500 text-base">
                            <option value="Unpaid">Chưa thanh toán</option>
                            <option value="Paid">Đã thanh toán</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="ui.closeModal('modal-invoice')" class="px-4 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100">Hủy</button>
                <button onclick="app.saveInvoice()" class="px-4 py-2 bg-orange-600 text-white rounded-md hover:bg-orange-700 shadow-sm">Lưu Hóa Đơn</button>
            </div>
        </div>
    </div>

    <!-- Modal Xác nhận Xóa -->
    <div id="modal-confirm" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm modal-enter overflow-hidden">
            <div class="p-6 text-center">
                <div class="w-16 h-16 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h3 id="confirm-title" class="font-bold text-lg text-slate-800 mb-2">Xác nhận xóa dữ liệu</h3>
                <p id="confirm-msg" class="text-slate-500 text-sm">Bạn có chắc chắn muốn xóa bản ghi này? Hành động này không thể hoàn tác.</p>
            </div>
            <div class="px-6 py-4 bg-slate-50 flex justify-center gap-3 border-t border-slate-100">
                <button onclick="ui.closeModal('modal-confirm')" class="px-6 py-2 border border-slate-300 text-slate-700 rounded-md hover:bg-slate-100 transition-colors font-medium">Hủy</button>
                <button onclick="app.confirmDelete()" class="px-6 py-2 bg-rose-600 text-white rounded-md hover:bg-rose-700 transition-colors shadow-sm font-medium">Xóa vĩnh viễn</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="fixed top-4 right-4 z-[70] flex flex-col gap-2 pointer-events-none w-64 md:w-auto left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0"></div>

    <script>
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        const DB = {
            patients: JSON.parse(localStorage.getItem('medicare_patients')) || [], 
            visits: JSON.parse(localStorage.getItem('medicare_visits')) || [], 
            appointments: JSON.parse(localStorage.getItem('medicare_appointments')) || [],
            medications: JSON.parse(localStorage.getItem('medicare_medications')) || [],
            invoices: JSON.parse(localStorage.getItem('medicare_invoices')) || [] // Thêm bảng Hóa đơn
        };

        const saveDB = () => {
            localStorage.setItem('medicare_patients', JSON.stringify(DB.patients));
            localStorage.setItem('medicare_visits', JSON.stringify(DB.visits));
            localStorage.setItem('medicare_appointments', JSON.stringify(DB.appointments));
            localStorage.setItem('medicare_medications', JSON.stringify(DB.medications)); 
            localStorage.setItem('medicare_invoices', JSON.stringify(DB.invoices)); 
        };

        const aptHelpers = {
            getBadgeClass: function(status) {
                switch(status) {
                    case 'Scheduled': return 'bg-blue-100 text-blue-700 border-blue-200';
                    case 'Completed': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                    case 'Missed': return 'bg-rose-100 text-rose-700 border-rose-200';
                    case 'Cancelled': return 'bg-slate-200 text-slate-600 border-slate-300';
                    default: return 'bg-slate-100 text-slate-600 border-slate-200';
                }
            },
            getText: function(status) {
                switch(status) {
                    case 'Scheduled': return 'Sắp tới';
                    case 'Completed': return 'Đã khám';
                    case 'Missed': return 'Bỏ lỡ';
                    case 'Cancelled': return 'Đã hủy';
                    default: return status;
                }
            }
        };

        function seedDatabase(num) {
            const firstNames = ['Nguyễn', 'Trần', 'Lê', 'Phạm', 'Hoàng', 'Đặng'];
            const lastNames = ['An', 'Bình', 'Châu', 'Dương', 'Hải', 'Khang', 'Lan', 'Minh', 'Ngọc', 'Tuấn'];
            const diags = ['Tăng huyết áp', 'Đái tháo đường', 'Rối loạn lipid máu', 'Viêm khớp', 'Dạ dày', 'Hen suyễn'];
            let today = new Date();

            for(let i = 1; i <= num; i++) {
                const pid = `P${i.toString().padStart(3, '0')}`;
                const name = `${firstNames[Math.floor(Math.random()*firstNames.length)]} ${lastNames[Math.floor(Math.random()*lastNames.length)]}`;
                let lastVisitDate = new Date();
                lastVisitDate.setDate(today.getDate() - Math.floor(Math.random() * 60));

                DB.patients.push({
                    id: pid, code: `BN${i.toString().padStart(4, '0')}`, name: name,
                    gender: Math.random()>0.5?'Nam':'Nữ', dob: `19${Math.floor(Math.random()*40)+50}-01-15`,
                    phone: `090${Math.floor(Math.random()*10000000)}`, blood_type: 'O+',
                    diagnosis: diags[Math.floor(Math.random()*diags.length)],
                    risk_level: Math.random() > 0.8 ? 'High' : (Math.random() > 0.5 ? 'Medium' : 'Low'),
                    last_visit: lastVisitDate.toISOString().split('T')[0]
                });

                if(Math.random() > 0.3) {
                    DB.visits.push({ id: `V${i}1`, patient_id: pid, date: lastVisitDate.toISOString().split('T')[0], complaint: 'Khám định kỳ', assessment: 'Ổn định', plan: 'Theo dõi' });
                }

                if(Math.random() > 0.6) {
                    let aptDate = new Date();
                    aptDate.setDate(today.getDate() + Math.floor(Math.random() * 20) - 10);
                    let statuses = ['Scheduled', 'Completed', 'Cancelled', 'Missed'];
                    let finalStatus = aptDate >= today ? 'Scheduled' : statuses[Math.floor(Math.random() * statuses.length)];
                    
                    DB.appointments.push({
                        id: `A${Date.now()}_${i}`, patient_id: pid, date: aptDate.toISOString().split('T')[0],
                        purpose: 'Tái khám', status: finalStatus
                    });
                }
                
                if(Math.random() > 0.5) {
                    DB.medications.push({
                        id: `M${i}1`, patient_id: pid, name: 'Amlodipine 5mg', route: 'Uống', freq: '1 viên Sáng', status: 'Active', note: 'Sau ăn'
                    });
                }

                if(Math.random() > 0.4) {
                    let invStatus = Math.random() > 0.3 ? 'Paid' : 'Unpaid';
                    DB.invoices.push({
                        id: `INV${i}_${Math.floor(Math.random()*1000)}`, patient_id: pid, date: lastVisitDate.toISOString().split('T')[0],
                        amount: Math.floor(Math.random() * 10 + 1) * 50000,
                        description: 'Phí khám bệnh và xét nghiệm',
                        status: invStatus
                    });
                }
            }
            saveDB();
        }

        const ui = {
            toggleSidebar: function() {
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('mobile-sidebar-backdrop');
                sidebar.classList.toggle('-translate-x-full');
                backdrop.classList.toggle('hidden');
            },
            closeSidebar: function() {
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('mobile-sidebar-backdrop');
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            },
            showToast: function(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                const colors = { success: 'bg-emerald-600', info: 'bg-blue-600', error: 'bg-rose-600' };
                const icons = { success: 'fa-check-circle', info: 'fa-info-circle', error: 'fa-circle-exclamation' };
                
                toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 fade-in transition-all duration-300`;
                toast.innerHTML = `<i class="fa-solid ${icons[type]} text-lg shrink-0"></i> <span class="font-medium text-sm">${message}</span>`;
                
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
            },
            openModal: id => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); },
            closeModal: id => { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        };

        const app = {
            currentView: 'dashboard',
            selectedPatient: null,
            detailTab: 'overview',
            apptTab: 'Scheduled', 
            patientFilter: 'All', 
            billFilter: 'All', 
            deleteTarget: { type: null, id: null },
            charts: {}, 

            getToday: () => new Date().toISOString().split('T')[0],

            setDetailTab: function(tabName) {
                this.detailTab = tabName;
                renderPatientDetailTabs();
            },

            navigate: function(viewId, params = null) {
                ui.closeSidebar();

                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'bg-e0f2fe', 'text-0369a1', 'border-r-4', 'border-0284c7'));
                const navEl = document.getElementById(`nav-${viewId}`);
                if(navEl) navEl.classList.add('active', 'bg-e0f2fe', 'text-0369a1', 'border-r-4', 'border-0284c7');

                document.querySelectorAll('.view-section').forEach(el => { el.classList.remove('block'); el.classList.add('hidden'); });
                const viewEl = document.getElementById(`view-${viewId}`);
                if(viewEl) { viewEl.classList.remove('hidden'); viewEl.classList.add('block'); }

                this.currentView = viewId;

                if (viewId === 'dashboard') renderDashboard();
                if (viewId === 'patients') {
                    this.patientFilter = params?.filter || 'All';
                    renderPatientsList();
                }
                if (viewId === 'appointments') renderAppointmentsList();
                if (viewId === 'billing') { 
                    this.billFilter = params?.filter || 'All';
                    renderBillingList();
                }
                if (viewId === 'patient-detail' && params?.id) {
                    this.selectedPatient = DB.patients.find(p => p.id === params.id);
                    this.detailTab = params?.tab || 'overview';
                    renderPatientDetail();
                }
            },

            // --- QUẢN LÝ BỆNH NHÂN ---
            openAddPatient: function() {
                ui.closeSidebar(); 
                document.getElementById('form-patient').reset();
                document.getElementById('inp_p_id').value = '';
                document.getElementById('modal-patient-title').innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Thêm Bệnh Nhân Mới';
                ui.openModal('modal-patient');
            },
            openEditPatient: function() {
                const p = this.selectedPatient; if(!p) return;
                document.getElementById('modal-patient-title').innerHTML = `<i class="fa-solid fa-user-pen mr-2"></i>Sửa Hồ Sơ: ${p.code}`;
                document.getElementById('inp_p_id').value = p.id;
                document.getElementById('inp_p_code').value = p.code;
                document.getElementById('inp_p_name').value = p.name;
                document.getElementById('inp_p_gender').value = p.gender;
                document.getElementById('inp_p_dob').value = p.dob;
                document.getElementById('inp_p_phone').value = p.phone;
                document.getElementById('inp_p_blood').value = p.blood_type;
                document.getElementById('inp_p_diag').value = p.diagnosis;
                document.getElementById('inp_p_risk').value = p.risk_level || 'Low';
                ui.openModal('modal-patient');
            },
            savePatient: function() {
                const id = document.getElementById('inp_p_id').value;
                const code = document.getElementById('inp_p_code').value.trim();
                const name = document.getElementById('inp_p_name').value.trim();
                const dob = document.getElementById('inp_p_dob').value;
                if(!code || !name || !dob) { ui.showToast('Vui lòng nhập Mã BN, Tên và Ngày sinh', 'error'); return; }

                const data = {
                    code, name, gender: document.getElementById('inp_p_gender').value, dob,
                    phone: document.getElementById('inp_p_phone').value, blood_type: document.getElementById('inp_p_blood').value,
                    diagnosis: document.getElementById('inp_p_diag').value, risk_level: document.getElementById('inp_p_risk').value
                };

                if (id) {
                    const idx = DB.patients.findIndex(p => p.id === id);
                    if(idx > -1) { DB.patients[idx] = { ...DB.patients[idx], ...data }; this.selectedPatient = DB.patients[idx]; }
                    ui.showToast('Đã cập nhật hồ sơ', 'success');
                } else {
                    const newId = `P${Date.now().toString().slice(-4)}`;
                    DB.patients.unshift({ id: newId, last_visit: 'Chưa có', ...data });
                    ui.showToast(`Đã thêm BN: ${code}`, 'success');
                    this.navigate('patient-detail', {id: newId}); 
                }
                
                saveDB(); 
                ui.closeModal('modal-patient');
                if (this.currentView === 'patients') renderPatientsList();
                if (this.currentView === 'patient-detail' && id) renderPatientDetail();
            },

            // --- QUẢN LÝ LƯỢT KHÁM ---
            openAddVisit: function(patientId = null) {
                if(patientId) this.selectedPatient = DB.patients.find(p => p.id === patientId); 
                if(!this.selectedPatient) return;
                
                document.getElementById('form-visit').reset();
                document.getElementById('inp_v_id').value = '';
                document.getElementById('inp_v_date').value = this.getToday();
                document.getElementById('modal-visit-title').innerHTML = `<i class="fa-solid fa-plus-circle mr-2"></i>Thêm Lượt Khám (${this.selectedPatient.name})`;
                ui.openModal('modal-visit');
            },
            openEditVisit: function(id) {
                const v = DB.visits.find(x => x.id === id); if(!v) return;
                document.getElementById('inp_v_id').value = v.id;
                document.getElementById('inp_v_date').value = v.date;
                document.getElementById('inp_v_complaint').value = v.complaint;
                document.getElementById('inp_v_assessment').value = v.assessment;
                document.getElementById('inp_v_plan').value = v.plan;
                document.getElementById('modal-visit-title').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>Sửa Thông Tin Khám';
                ui.openModal('modal-visit');
            },
            saveVisit: function() {
                const id = document.getElementById('inp_v_id').value;
                const date = document.getElementById('inp_v_date').value;
                const complaint = document.getElementById('inp_v_complaint').value;
                if(!complaint) { ui.showToast('Bắt buộc nhập Lý do khám', 'error'); return; }

                const data = { date, complaint, assessment: document.getElementById('inp_v_assessment').value, plan: document.getElementById('inp_v_plan').value };

                if (id) { 
                    const idx = DB.visits.findIndex(v => v.id === id);
                    if(idx > -1) DB.visits[idx] = { ...DB.visits[idx], ...data };
                    ui.showToast('Đã cập nhật lượt khám', 'success');
                } else { 
                    DB.visits.unshift({ id: `V${Date.now()}`, patient_id: this.selectedPatient.id, ...data });
                    const pIdx = DB.patients.findIndex(p => p.id === this.selectedPatient.id);
                    if(pIdx > -1) DB.patients[pIdx].last_visit = date; 
                    ui.showToast('Đã tạo lượt khám mới', 'success');
                }
                
                saveDB();
                ui.closeModal('modal-visit');
                if(this.currentView !== 'patient-detail') this.navigate('patient-detail', {id: this.selectedPatient.id, tab: 'visits'});
                else { this.detailTab = 'visits'; renderPatientDetailTabs(); }
            },

            // --- QUẢN LÝ ĐƠN THUỐC ---
            openAddMedication: function() {
                if(!this.selectedPatient) return;
                document.getElementById('form-med').reset();
                document.getElementById('inp_m_id').value = '';
                document.getElementById('modal-med-title').innerHTML = '<i class="fa-solid fa-capsules mr-2"></i>Kê Đơn Thuốc Mới';
                ui.openModal('modal-medication');
            },
            openEditMedication: function(id) {
                const m = DB.medications.find(x => x.id === id); if(!m) return;
                document.getElementById('inp_m_id').value = m.id;
                document.getElementById('inp_m_name').value = m.name;
                document.getElementById('inp_m_route').value = m.route;
                document.getElementById('inp_m_freq').value = m.freq;
                document.getElementById('inp_m_status').value = m.status;
                document.getElementById('inp_m_note').value = m.note || '';
                document.getElementById('modal-med-title').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>Sửa Đơn Thuốc';
                ui.openModal('modal-medication');
            },
            saveMedication: function() {
                const id = document.getElementById('inp_m_id').value;
                const name = document.getElementById('inp_m_name').value.trim();
                if(!name) { ui.showToast('Vui lòng nhập Tên thuốc', 'error'); return; }

                const data = {
                    name, route: document.getElementById('inp_m_route').value,
                    freq: document.getElementById('inp_m_freq').value,
                    status: document.getElementById('inp_m_status').value,
                    note: document.getElementById('inp_m_note').value
                };

                if (id) {
                    const idx = DB.medications.findIndex(m => m.id === id);
                    if(idx > -1) DB.medications[idx] = { ...DB.medications[idx], ...data };
                    ui.showToast('Đã cập nhật đơn thuốc', 'success');
                } else {
                    DB.medications.unshift({ id: `M${Date.now()}`, patient_id: this.selectedPatient.id, ...data });
                    ui.showToast('Đã thêm thuốc mới', 'success');
                }
                
                saveDB();
                ui.closeModal('modal-medication');
                if (this.currentView === 'patient-detail') { this.detailTab = 'meds'; renderPatientDetailTabs(); }
            },

            // --- IN ĐƠN THUỐC ---
            printPrescription: function() {
                const p = this.selectedPatient;
                const meds = DB.medications.filter(m => m.patient_id === p.id && m.status === 'Active');
                if(meds.length === 0) { ui.showToast('Bệnh nhân không có thuốc đang dùng để in', 'info'); return; }

                const printWin = window.open('', '', 'width=800,height=600');
                printWin.document.write(`
                    <html><head><title>Đơn Thuốc - ${p.name}</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; padding: 40px; line-height: 1.6; color: #000; }
                        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
                        .clinic-name { font-size: 24px; font-weight: bold; margin: 0; text-transform: uppercase; }
                        .clinic-info { margin: 5px 0 0 0; font-size: 14px; }
                        .title { text-align: center; text-transform: uppercase; font-size: 22px; margin: 20px 0 30px; letter-spacing: 2px;}
                        .patient-info { margin-bottom: 30px; font-size: 16px; }
                        .patient-info p { margin: 8px 0; }
                        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                        th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 15px; }
                        th { background-color: #f0f0f0; }
                        .footer { margin-top: 50px; text-align: right; font-size: 16px; padding-right: 20px;}
                        .signature { margin-top: 80px; font-style: italic; }
                    </style>
                    </head><body>
                        <div class="header">
                            <h1 class="clinic-name">Phòng Khám MediCare Pro</h1>
                            <p class="clinic-info">52 Lý Chiêu Hoàng, Medicare Pro, TP.HCM | SĐT: 0869877995</p>
                        </div>
                        <h2 class="title">Đơn Thuốc</h2>
                        <div class="patient-info">
                            <p><strong>Họ và tên bệnh nhân:</strong> ${p.name.toUpperCase()} <span style="float:right;"><strong>Mã BN:</strong> ${p.code}</span></p>
                            <p><strong>Tuổi:</strong> ${new Date().getFullYear() - parseInt(p.dob.split('-')[0])} 
                               <span style="margin-left: 50px;"><strong>Giới tính:</strong> ${p.gender}</span>
                               <span style="float:right;"><strong>SĐT:</strong> ${p.phone}</span></p>
                            <p><strong>Chẩn đoán:</strong> ${p.diagnosis || 'Chưa cập nhật'}</p>
                        </div>
                        <h3 style="margin-bottom: 10px; font-size: 18px;">Chỉ định dùng thuốc:</h3>
                        <table>
                            <thead><tr><th width="5%">STT</th><th width="35%">Tên thuốc (Hoạt chất)</th><th width="15%">Đường dùng</th><th width="25%">Liều dùng/Tần suất</th><th width="20%">Ghi chú</th></tr></thead>
                            <tbody>
                                ${meds.map((m, i) => `<tr><td style="text-align:center;">${i+1}</td><td><strong>${m.name}</strong></td><td>${m.route}</td><td>${m.freq}</td><td>${m.note || ''}</td></tr>`).join('')}
                            </tbody>
                        </table>
                        <div class="footer">
                            <p>Ngày ${new Date().getDate()} tháng ${new Date().getMonth() + 1} năm ${new Date().getFullYear()}</p>
                            <p><strong>Bác sĩ điều trị</strong></p>
                            <div class="signature">(Ký và ghi rõ họ tên)</div>
                        </div>
                        <script>window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 200); }<\/script>
                    </body></html>
                `);
                printWin.document.close();
            },

            // --- QUẢN LÝ LỊCH HẸN ---
            openAddAppointment: function(patientId = null) {
                document.getElementById('form-appointment').reset();
                document.getElementById('inp_a_id').value = '';
                document.getElementById('inp_a_date').value = this.getToday();
                document.getElementById('modal-appointment-title').innerHTML = '<i class="fa-solid fa-calendar-plus mr-2"></i>Tạo Lịch Hẹn Mới';
                
                const select = document.getElementById('inp_a_patient');
                select.innerHTML = DB.patients.map(p => `<option value="${p.id}">${p.code} - ${p.name}</option>`).join('');
                select.disabled = false;

                if (patientId) select.value = patientId;
                else if (this.selectedPatient && this.currentView === 'patient-detail') select.value = this.selectedPatient.id;
                
                ui.openModal('modal-appointment');
            },
            openEditAppointment: function(id) {
                const a = DB.appointments.find(x => x.id === id); if(!a) return;
                document.getElementById('inp_a_id').value = a.id;
                document.getElementById('inp_a_date').value = a.date;
                document.getElementById('inp_a_purpose').value = a.purpose;
                document.getElementById('modal-appointment-title').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>Sửa Lịch Hẹn';
                
                const select = document.getElementById('inp_a_patient');
                select.innerHTML = DB.patients.map(p => `<option value="${p.id}" ${p.id === a.patient_id ? 'selected' : ''}>${p.code} - ${p.name}</option>`).join('');
                select.disabled = true; 
                ui.openModal('modal-appointment');
            },
            saveAppointment: function() {
                const id = document.getElementById('inp_a_id').value;
                const pid = document.getElementById('inp_a_patient').value;
                const date = document.getElementById('inp_a_date').value;
                const purpose = document.getElementById('inp_a_purpose').value;
                if(!pid || !date || !purpose) { ui.showToast('Vui lòng điền đủ thông tin', 'error'); return; }

                if (id) {
                    const idx = DB.appointments.findIndex(a => a.id === id);
                    if(idx > -1) { DB.appointments[idx].date = date; DB.appointments[idx].purpose = purpose; }
                    ui.showToast('Cập nhật lịch hẹn thành công', 'success');
                } else {
                    DB.appointments.push({ id: `A${Date.now()}`, patient_id: pid, date, purpose, status: 'Scheduled' });
                    ui.showToast('Đã tạo lịch hẹn mới', 'success');
                }

                saveDB(); 
                ui.closeModal('modal-appointment');
                if (this.currentView === 'appointments') renderAppointmentsList();
                if (this.currentView === 'dashboard') renderDashboard();
                if (this.currentView === 'patient-detail') { this.detailTab = 'appointments'; renderPatientDetailTabs(); }
            },
            markApptStatus: function(id, newStatus) {
                const idx = DB.appointments.findIndex(a => a.id === id);
                if(idx > -1) {
                    DB.appointments[idx].status = newStatus;
                    saveDB(); 
                    
                    const msgs = { 'Scheduled': 'Khôi phục trạng thái Sắp tới', 'Completed': 'Xác nhận Hoàn tất', 'Cancelled': 'Đã Hủy lịch hẹn', 'Missed': 'Đánh dấu Bỏ lỡ' };
                    const type = (newStatus === 'Cancelled' || newStatus === 'Missed') ? 'info' : 'success';
                    ui.showToast(msgs[newStatus], type);
                    
                    if (this.currentView === 'appointments') renderAppointmentsList();
                    if (this.currentView === 'dashboard') renderDashboard();
                    if (this.currentView === 'patient-detail') renderPatientDetailTabs();
                }
            },

            // --- QUẢN LÝ HÓA ĐƠN ---
            openAddInvoice: function(patientId = null) {
                document.getElementById('form-invoice').reset();
                document.getElementById('inp_i_id').value = '';
                document.getElementById('inp_i_date').value = this.getToday();
                document.getElementById('modal-invoice-title').innerHTML = '<i class="fa-solid fa-file-invoice-dollar mr-2"></i>Tạo Hóa Đơn Mới';
                
                const select = document.getElementById('inp_i_patient');
                select.innerHTML = DB.patients.map(p => `<option value="${p.id}">${p.code} - ${p.name}</option>`).join('');
                select.disabled = false;

                if (patientId) select.value = patientId;
                else if (this.selectedPatient && this.currentView === 'patient-detail') select.value = this.selectedPatient.id;
                
                ui.openModal('modal-invoice');
            },
            openEditInvoice: function(id) {
                const i = DB.invoices.find(x => x.id === id); if(!i) return;
                document.getElementById('inp_i_id').value = i.id;
                document.getElementById('inp_i_date').value = i.date;
                document.getElementById('inp_i_amount').value = i.amount;
                document.getElementById('inp_i_desc').value = i.description;
                document.getElementById('inp_i_status').value = i.status;
                document.getElementById('modal-invoice-title').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>Sửa Hóa Đơn';
                
                const select = document.getElementById('inp_i_patient');
                select.innerHTML = DB.patients.map(p => `<option value="${p.id}" ${p.id === i.patient_id ? 'selected' : ''}>${p.code} - ${p.name}</option>`).join('');
                select.disabled = true; 
                ui.openModal('modal-invoice');
            },
            saveInvoice: function() {
                const id = document.getElementById('inp_i_id').value;
                const pid = document.getElementById('inp_i_patient').value;
                const date = document.getElementById('inp_i_date').value;
                const amount = document.getElementById('inp_i_amount').value;
                const desc = document.getElementById('inp_i_desc').value;
                const status = document.getElementById('inp_i_status').value;

                if(!pid || !date || !amount || !desc) { ui.showToast('Vui lòng điền đầy đủ thông tin bắt buộc', 'error'); return; }

                const data = { patient_id: pid, date, amount: Number(amount), description: desc, status };

                if (id) {
                    const idx = DB.invoices.findIndex(i => i.id === id);
                    if(idx > -1) DB.invoices[idx] = { id, ...data };
                    ui.showToast('Cập nhật hóa đơn thành công', 'success');
                } else {
                    DB.invoices.push({ id: `INV${Date.now()}`, ...data });
                    ui.showToast('Đã tạo hóa đơn mới', 'success');
                }

                saveDB();
                ui.closeModal('modal-invoice');
                if (this.currentView === 'billing') renderBillingList();
                if (this.currentView === 'patient-detail') { this.detailTab = 'invoices'; renderPatientDetailTabs(); }
            },
            markInvoiceStatus: function(id, status) {
                const idx = DB.invoices.findIndex(i => i.id === id);
                if(idx > -1) {
                    DB.invoices[idx].status = status;
                    saveDB();
                    ui.showToast(status === 'Paid' ? 'Đã thu tiền thành công' : 'Đã chuyển thành Chưa thanh toán', 'success');
                    if(this.currentView === 'billing') renderBillingList();
                    if(this.currentView === 'patient-detail') renderPatientDetailTabs();
                }
            },

            // --- XÓA DỮ LIỆU ---
            requestDelete: function(type, id) {
                this.deleteTarget = { type, id };
                const titleEl = document.getElementById('confirm-title');
                const msgEl = document.getElementById('confirm-msg');
                
                if(type === 'patient') {
                    titleEl.innerText = "Xóa toàn bộ Hồ Sơ?";
                    msgEl.innerHTML = "Hành động này sẽ <strong>xóa vĩnh viễn</strong> hồ sơ bệnh nhân, cùng toàn bộ lịch khám, hóa đơn và đơn thuốc. Không thể hoàn tác.";
                } else {
                    titleEl.innerText = "Xác nhận xóa dữ liệu";
                    msgEl.innerText = "Bạn có chắc chắn muốn xóa bản ghi này? Hành động này không thể hoàn tác.";
                }
                ui.openModal('modal-confirm');
            },
            confirmDelete: function() {
                const { type, id } = this.deleteTarget;
                
                if(type === 'patient') {
                    DB.patients = DB.patients.filter(p => p.id !== id);
                    DB.visits = DB.visits.filter(v => v.patient_id !== id);
                    DB.appointments = DB.appointments.filter(a => a.patient_id !== id);
                    DB.medications = DB.medications.filter(m => m.patient_id !== id);
                    DB.invoices = DB.invoices.filter(i => i.patient_id !== id);
                    saveDB();
                    ui.closeModal('modal-confirm');
                    ui.showToast('Đã xóa hồ sơ và mọi dữ liệu', 'success');
                    this.navigate('patients'); 
                    return;
                } 
                else if(type === 'visit') DB.visits = DB.visits.filter(v => v.id !== id);
                else if (type === 'appointment') DB.appointments = DB.appointments.filter(a => a.id !== id);
                else if (type === 'medication') DB.medications = DB.medications.filter(m => m.id !== id);
                else if (type === 'invoice') DB.invoices = DB.invoices.filter(i => i.id !== id);
                
                saveDB(); 
                ui.closeModal('modal-confirm');
                ui.showToast('Đã xóa dữ liệu thành công', 'success');
                
                if(this.currentView === 'appointments') renderAppointmentsList();
                if(this.currentView === 'billing') renderBillingList();
                if(this.currentView === 'dashboard') renderDashboard();
                if(this.currentView === 'patient-detail') renderPatientDetailTabs();
            }
        };

                                <!-- Nút in đơn thuốc -->
                                <button onclick="app.printPrescription()" class="text-xs md:text-sm bg-slate-100 text-slate-700 px-3 md:px-4 py-2 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-200 transition-colors mr-2"><i class="fa-solid fa-print mr-1 md:mr-2"></i>In Đơn Thuốc</button>
                                <button onclick="app.openAddMedication()" class="text-xs md:text-sm bg-purple-600 text-white px-3 md:px-4 py-2 rounded-lg shadow-sm hover:bg-purple-700 transition-colors"><i class="fa-solid fa-plus mr-1 md:mr-2"></i>Kê Thuốc</button>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 font-medium hidden md:table-header-group">
                                    <tr>
                                        <th class="px-6 py-4">Tên Thuốc</th>
                                        <th class="px-6 py-4">Liều dùng</th>
                                        <th class="px-6 py-4">Trạng thái</th>
                                        <th class="px-6 py-4 text-right">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 block md:table-row-group">
                                    ${pMeds.map(m => `
                                        <tr class="hover:bg-slate-50 transition-colors hover-reveal-container block md:table-row p-4 md:p-0 border-b border-slate-100 md:border-b-0 relative">
                                            <td class="md:px-6 md:py-4 mb-2 md:mb-0 block md:table-cell">
                                                <p class="font-bold text-slate-800">${m.name}</p>
                                                ${m.note ? `<p class="text-xs text-slate-500 mt-1">${m.note}</p>` : ''}
                                            </td>
                                            <td class="md:px-6 md:py-4 mb-3 md:mb-0 block md:table-cell text-slate-600">
                                                <span class="md:hidden font-medium mr-2">Cách dùng:</span>${m.route} • ${m.freq}
                                            </td>
                                            <td class="md:px-6 md:py-4 block md:table-cell">
                                                <span class="px-2 py-1 rounded text-xs font-semibold ${m.status === 'Active' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600'}">${m.status === 'Active' ? 'Đang dùng' : 'Đã ngưng'}</span>
                                            </td>
                                            <td class="md:px-6 md:py-4 md:text-right absolute md:relative top-4 right-4 md:top-auto md:right-auto">
                                                <div class="action-group flex justify-end gap-1">
                                                    <button onclick="app.openEditMedication('${m.id}')" class="w-8 h-8 rounded text-slate-400 hover:text-purple-600 hover:bg-purple-50" title="Sửa"><i class="fa-solid fa-pen text-sm"></i></button>
                                                    <button onclick="app.requestDelete('medication', '${m.id}')" class="w-8 h-8 rounded text-slate-400 hover:text-rose-600 hover:bg-rose-50" title="Xóa"><i class="fa-solid fa-trash text-sm"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${pMeds.length === 0 ? '<tr class="block md:table-row"><td colspan="4" class="text-center py-10 text-slate-500">Chưa có thông tin đơn thuốc.</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            else if (app.detailTab === 'appointments') {
                html = `
                    <div class="fade-in max-w-4xl mx-auto">
                        <div class="flex justify-between items-center mb-4 md:mb-6">
                            <h2 class="text-lg md:text-xl font-bold text-slate-800">Lịch Hẹn</h2>
                            <button onclick="app.openAddAppointment('${p.id}')" class="text-xs md:text-sm bg-blue-600 text-white px-3 md:px-4 py-2 rounded-lg shadow-sm hover:bg-blue-700 transition-colors"><i class="fa-regular fa-calendar-plus mr-1 md:mr-2"></i>Tạo Lịch</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${pApts.map(apt => {
                                return `
                                <div class="bg-white p-4 md:p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col hover-reveal-container transition-all">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="flex items-center gap-2">
                                            <i class="fa-regular fa-calendar text-blue-500"></i>
                                            <p class="font-bold text-slate-800">${apt.date}</p>
                                        </div>
                                        <span class="px-2 py-0.5 ${aptHelpers.getBadgeClass(apt.status)} border text-[10px] font-bold rounded-full uppercase tracking-wider">${aptHelpers.getText(apt.status)}</span>
                                    </div>
                                    <p class="text-sm text-slate-600 mb-4 flex-1">${apt.purpose}</p>
                                    
                                    <div class="flex justify-between items-center border-t border-slate-100 pt-3 mt-auto">
                                        <div class="action-group flex gap-1">
                                            <button onclick="app.openEditAppointment('${apt.id}')" class="w-8 h-8 rounded-full text-slate-400 hover:text-blue-600 hover:bg-blue-50" title="Sửa"><i class="fa-solid fa-pen text-sm"></i></button>
                                            <button onclick="app.requestDelete('appointment', '${apt.id}')" class="w-8 h-8 rounded-full text-slate-400 hover:text-rose-600 hover:bg-rose-50" title="Xóa"><i class="fa-solid fa-trash text-sm"></i></button>
                                        </div>
                                        
                                        <select onchange="app.markApptStatus('${apt.id}', this.value)" class="text-xs font-semibold rounded-md px-2 py-1 border border-slate-200 bg-slate-50 focus:outline-none focus:border-primary text-slate-600 shadow-sm cursor-pointer">
                                            <option value="Scheduled" ${apt.status==='Scheduled'?'selected':''}>Sắp tới</option>
                                            <option value="Completed" ${apt.status==='Completed'?'selected':''}>Hoàn tất</option>
                                            <option value="Missed" ${apt.status==='Missed'?'selected':''}>Bỏ lỡ</option>
                                            <option value="Cancelled" ${apt.status==='Cancelled'?'selected':''}>Đã hủy</option>
                                        </select>
                                    </div>
                                </div>
                                `
                            }).join('')}
                            ${pApts.length === 0 ? '<div class="col-span-full text-center py-12 text-slate-400 bg-white rounded-xl border border-dashed border-slate-200">Chưa có lịch hẹn nào được ghi nhận.</div>' : ''}
                        </div>
                    </div>
                `;
            }
            // Tab Hóa Đơn trong chi tiết Bệnh nhân
            else if (app.detailTab === 'invoices') {
                html = `
                    <div class="fade-in max-w-4xl mx-auto">
                        <div class="flex justify-between items-center mb-4 md:mb-6">
                            <h2 class="text-lg md:text-xl font-bold text-slate-800">Lịch Sử Viện Phí</h2>
                            <button onclick="app.openAddInvoice('${p.id}')" class="text-xs md:text-sm bg-orange-600 text-white px-3 md:px-4 py-2 rounded-lg shadow-sm hover:bg-orange-700 transition-colors"><i class="fa-solid fa-plus mr-1 md:mr-2"></i>Tạo Hóa Đơn</button>
                        </div>
                        <div class="space-y-3">
                            ${pInvs.map(inv => `
                                <div class="bg-white p-4 border border-slate-200 rounded-xl shadow-sm flex flex-col sm:flex-row justify-between sm:items-center hover-reveal-container gap-3">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <p class="font-bold text-slate-800">${formatCurrency(inv.amount)}</p>
                                            <span class="px-2 py-0.5 rounded text-[10px] font-semibold border ${inv.status === 'Paid' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-rose-50 text-rose-700 border-rose-200'}">${inv.status === 'Paid' ? 'Đã thu' : 'Chưa thu'}</span>
                                        </div>
                                        <p class="text-sm text-slate-600">${inv.description}</p>
                                        <p class="text-xs text-slate-400 mt-1"><i class="fa-regular fa-calendar mr-1"></i> ${inv.date}</p>
                                    </div>
                                    <div class="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 pt-3 sm:pt-0 border-slate-100">
                                        <select onchange="app.markInvoiceStatus('${inv.id}', this.value)" class="text-xs font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-white focus:outline-none cursor-pointer">
                                            <option value="Unpaid" ${inv.status==='Unpaid'?'selected':''}>Chưa thanh toán</option>
                                            <option value="Paid" ${inv.status==='Paid'?'selected':''}>Đã thanh toán</option>
                                        </select>
                                        <div class="action-group flex gap-1">
                                            <button onclick="app.openEditInvoice('${inv.id}')" class="w-8 h-8 rounded text-slate-400 hover:text-orange-600 hover:bg-orange-50" title="Sửa"><i class="fa-solid fa-pen text-xs"></i></button>
                                            <button onclick="app.requestDelete('invoice', '${inv.id}')" class="w-8 h-8 rounded text-slate-400 hover:text-rose-600 hover:bg-rose-50" title="Xóa"><i class="fa-solid fa-trash text-xs"></i></button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                            ${pInvs.length === 0 ? '<div class="text-center py-10 text-slate-500 bg-white border border-dashed border-slate-200 rounded-xl">Không có hóa đơn nào.</div>' : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.onload = () => {
            if (DB.patients.length === 0) seedDatabase(40); 
            app.navigate('dashboard');
        };
    </script>
</body>
</html>

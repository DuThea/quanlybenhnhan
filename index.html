<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0E1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BO Capital OS" />
<title>BO Capital OS</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  /* ============================================================
     BO CAPITAL OS — instrument / risk-terminal aesthetic
     Near-monochrome ink. Color is semantic only:
       green = win / positive edge   red = loss / danger   amber = caution / insufficient sample
     Signature: the Edge Gate meter (win-rate vs break-even threshold tick).
     All numeric readouts are monospaced (a trading-instrument tell).
     ============================================================ */
  :root{
    --bg:#0E1117; --surface:#161B22; --surface-2:#1C232D; --surface-3:#232C38;
    --line:#2A323D; --line-soft:#20272F;
    --ink:#E6EAF0; --ink-2:#9BA6B4; --ink-3:#5D6875;
    --pos:#3FB37F; --pos-dim:#173a2c; --pos-line:#2c7a5a;
    --neg:#E5484D; --neg-dim:#3a1718; --neg-line:#a13236;
    --warn:#E0A03A; --warn-dim:#3a2c12;
    --slate:#5C7AA6; /* structural, non-semantic accent */
    --r:14px; --r-sm:10px;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left); --safe-r:env(safe-area-inset-right);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{
    margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.45;overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  input,select,button,textarea{font-family:inherit;font-size:16px;color:inherit;}
  button{cursor:pointer;touch-action:manipulation;}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .pos{color:var(--pos);} .neg{color:var(--neg);} .warn{color:var(--warn);} .muted{color:var(--ink-3);}
  a{color:var(--slate);}

  /* ---------- App shell ---------- */
  #app{min-height:100vh;padding-left:var(--safe-l);padding-right:var(--safe-r);}
  header.topbar{
    position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;
    padding:calc(var(--safe-t) + 12px) 18px 12px;background:rgba(14,17,23,.86);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);
  }
  .brand{display:flex;flex-direction:column;line-height:1.05;}
  .brand b{font-size:15px;letter-spacing:.14em;font-weight:700;}
  .brand small{font-size:10.5px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;margin-top:2px;}
  .brand-dot{width:10px;height:10px;border-radius:3px;background:var(--slate);box-shadow:0 0 0 3px rgba(92,122,166,.18);}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .pill{font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:99px;border:1px solid var(--line);color:var(--ink-2);white-space:nowrap;}
  .pill.live{border-color:var(--pos-line);color:var(--pos);}
  .pill.off{border-color:var(--line);color:var(--ink-3);}

  main{max-width:760px;margin:0 auto;padding:16px 16px 108px;}
  @media(min-width:900px){
    #app{display:grid;grid-template-columns:230px 1fr;}
    header.topbar{grid-column:1/3;}
    nav.side{display:flex;}
    nav.tabbar{display:none;}
    main{grid-column:2;padding-bottom:40px;}
  }

  /* ---------- Panels / cards ---------- */
  .view{animation:fade .22s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .view-head{display:flex;align-items:baseline;gap:10px;margin:2px 2px 14px;}
  .view-head h2{font-size:19px;}
  .view-head .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;}
  .card.tight{padding:13px 14px;}
  .card h3{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .row{display:flex;gap:12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .sep{height:1px;background:var(--line-soft);margin:12px 0;}

  .stat{display:flex;flex-direction:column;gap:3px;}
  .stat .k{font-size:11px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase;}
  .stat .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:22px;font-weight:600;letter-spacing:-.01em;}
  .stat .v.sm{font-size:17px;}
  .stat .sub{font-size:11px;color:var(--ink-3);font-family:var(--mono);}

  .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 9px;border-radius:99px;border:1px solid var(--line);letter-spacing:.04em;}
  .badge.pos{color:var(--pos);border-color:var(--pos-line);background:var(--pos-dim);}
  .badge.neg{color:var(--neg);border-color:var(--neg-line);background:var(--neg-dim);}
  .badge.warn{color:var(--warn);border-color:#6b5220;background:var(--warn-dim);}
  .dotled{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}

  /* ---------- Buttons ---------- */
  .btn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;font-weight:600;transition:transform .06s,background .15s,border-color .15s;}
  .btn:active{transform:scale(.97);}
  .btn.block{width:100%;}
  .btn.ghost{background:transparent;color:var(--ink-2);}
  .btn.slate{border-color:var(--slate);color:#bcd0ee;}
  .btn.sm{padding:8px 11px;font-size:13px;}
  .btn.danger{border-color:var(--neg-line);color:var(--neg);background:var(--neg-dim);}
  .btn:disabled{opacity:.4;pointer-events:none;}

  /* ---------- Trade screen ---------- */
  .discipline{border-radius:var(--r);padding:14px 15px;margin-bottom:14px;border:1px solid var(--line);display:flex;gap:12px;align-items:flex-start;animation:slidein .25s ease;}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
  .discipline.ok{background:var(--surface);}
  .discipline.lock{background:linear-gradient(180deg,#3a1718,#2a1416);border-color:var(--neg-line);}
  .discipline.warn{background:linear-gradient(180deg,#3a2c12,#241d10);border-color:#6b5220;}
  .discipline .ico{flex:0 0 auto;width:30px;height:30px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.05);}
  .discipline .msg b{display:block;font-size:14px;margin-bottom:3px;letter-spacing:.01em;}
  .discipline .msg ul{margin:4px 0 0;padding-left:16px;font-size:12.5px;color:var(--ink-2);}
  .discipline .msg ul li{margin:2px 0;}

  .roundstate{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px;}
  .rs-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .rs-round{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:.02em;}
  .rs-tierwrap{text-align:right;}
  .rs-tier{font-family:var(--mono);font-size:14px;color:var(--ink-2);}
  .tierbar{display:flex;gap:4px;margin-top:6px;justify-content:flex-end;}
  .tierbar i{width:16px;height:6px;border-radius:2px;background:var(--surface-3);}
  .tierbar i.done{background:var(--neg);}
  .tierbar i.cur{background:var(--warn);box-shadow:0 0 8px var(--warn);}
  .tierbar i.warnzone{background:#4a3a18;}

  .sizebox{text-align:center;padding:18px 12px 14px;border:1px solid var(--line);border-radius:var(--r);background:radial-gradient(120% 120% at 50% 0%,#1b232e 0%,#141a21 100%);margin-bottom:14px;}
  .sizebox .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .sizebox .amt{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:52px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin:4px 0 2px;}
  .sizebox .amt.locked{color:var(--ink-3);}
  .sizebox .meta{display:flex;justify-content:center;gap:16px;font-family:var(--mono);font-size:12px;color:var(--ink-2);}
  .sizebox .meta b{color:var(--neg);}

  .wl{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .wl button{border:none;border-radius:var(--r);padding:22px 12px;font-size:19px;font-weight:750;letter-spacing:.04em;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .06s,filter .15s;}
  .wl button:active{transform:scale(.96);}
  .wl button small{font-size:11px;font-weight:600;letter-spacing:.1em;opacity:.85;}
  .wl .win{background:linear-gradient(180deg,#2f9e6e,#227a54);color:#eafff5;box-shadow:0 6px 20px -8px rgba(63,179,127,.6);}
  .wl .loss{background:linear-gradient(180deg,#d8434a,#a5323a);color:#ffeeee;box-shadow:0 6px 20px -8px rgba(229,72,77,.55);}
  .wl button:disabled{filter:grayscale(.7) brightness(.6);pointer-events:none;box-shadow:none;}
  .subactions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}

  /* emotion / notes */
  .stars{display:flex;gap:6px;}
  .stars button{background:none;border:none;padding:2px;font-size:24px;line-height:1;color:var(--ink-3);transition:transform .1s;}
  .stars button.on{color:var(--warn);}
  .stars button:active{transform:scale(1.2);}
  textarea.note{width:100%;min-height:52px;resize:vertical;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;color:var(--ink);font-size:16px;line-height:1.4;}

  /* ---------- Edge Gate meter (signature) ---------- */
  .gate{position:relative;height:52px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;margin:6px 0 4px;}
  .gate .zone-neg{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(229,72,77,.16),rgba(229,72,77,.05));}
  .gate .zone-pos{position:absolute;right:0;top:0;bottom:0;background:linear-gradient(270deg,rgba(63,179,127,.16),rgba(63,179,127,.05));}
  .gate .tick{position:absolute;top:0;bottom:0;width:2px;background:var(--ink);opacity:.85;}
  .gate .tick::after{content:attr(data-l);position:absolute;top:4px;left:6px;font-family:var(--mono);font-size:10px;color:var(--ink-2);white-space:nowrap;}
  .gate .marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 10px currentColor;}
  .gate .mval{position:absolute;bottom:5px;transform:translateX(-50%);font-family:var(--mono);font-size:11px;font-weight:700;white-space:nowrap;}
  .gate-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:2px;}

  /* progress bars */
  .pbar{height:9px;border-radius:99px;background:var(--surface-3);overflow:hidden;}
  .pbar > span{display:block;height:100%;border-radius:99px;background:var(--slate);transition:width .4s;}
  .pbar > span.pos{background:var(--pos);} .pbar > span.warn{background:var(--warn);} .pbar > span.neg{background:var(--neg);}
  .pbar-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--ink-2);margin-bottom:6px;}

  /* ---------- Tables ---------- */
  table{width:100%;border-collapse:collapse;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12.5px;}
  th,td{text-align:right;padding:8px 6px;border-bottom:1px solid var(--line-soft);white-space:nowrap;}
  th{color:var(--ink-3);font-weight:600;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;position:sticky;top:0;}
  th:first-child,td:first-child{text-align:left;}
  tr.danger td{background:var(--neg-dim);}
  tr.danger td:first-child{color:var(--neg);font-weight:700;}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px;}

  /* charts */
  .chartwrap{width:100%;overflow:hidden;}
  svg.chart{display:block;width:100%;height:auto;}
  .legend{display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--ink-2);margin-top:8px;flex-wrap:wrap;}
  .legend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle;}

  /* ---------- Log drill-down ---------- */
  .acc{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden;background:var(--surface);}
  .acc-h{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;user-select:none;}
  .acc-h .chev{transition:transform .2s;color:var(--ink-3);flex:0 0 auto;}
  .acc.open>.acc-h .chev{transform:rotate(90deg);}
  .acc-h .grow{flex:1;min-width:0;}
  .acc-h .t1{font-size:13.5px;font-weight:600;font-family:var(--mono);}
  .acc-h .t2{font-size:11px;color:var(--ink-3);font-family:var(--mono);}
  .acc-body{display:none;padding:0 13px 12px;}
  .acc.open>.acc-body{display:block;}
  .acc.lv2{background:var(--surface-2);margin:8px 0;}
  .seq{display:inline-flex;gap:3px;font-family:var(--mono);font-size:11px;font-weight:700;}
  .seq b{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:4px;}
  .seq b.L{background:var(--neg-dim);color:var(--neg);}
  .seq b.W{background:var(--pos-dim);color:var(--pos);}
  .tradeline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding:5px 0;border-bottom:1px solid var(--line-soft);color:var(--ink-2);}

  /* ---------- Forms / settings ---------- */
  label.f{display:block;margin-bottom:12px;}
  label.f .lk{display:block;font-size:12px;color:var(--ink-2);margin-bottom:5px;letter-spacing:.02em;}
  label.f .hint{font-size:11px;color:var(--ink-3);margin-top:4px;line-height:1.35;}
  input.i,select.i{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;color:var(--ink);font-family:var(--mono);}
  input.i:focus,select.i:focus,textarea.note:focus{outline:none;border-color:var(--slate);}
  .inline-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* ---------- Navigation ---------- */
  nav.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;
    background:rgba(20,25,32,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);
    padding:6px 4px calc(var(--safe-b) + 6px);padding-left:calc(var(--safe-l) + 4px);padding-right:calc(var(--safe-r) + 4px);}
  nav.tabbar a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;border-radius:10px;text-decoration:none;color:var(--ink-3);transition:color .15s;}
  nav.tabbar a .lab{font-size:10px;letter-spacing:.02em;font-weight:600;}
  nav.tabbar a svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;}
  nav.tabbar a.active{color:var(--ink);}
  nav.tabbar a.active svg{stroke:var(--slate);}
  nav.side{display:none;flex-direction:column;gap:4px;padding:18px 12px;border-right:1px solid var(--line-soft);position:sticky;top:0;align-self:start;height:100vh;}
  nav.side a{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;text-decoration:none;color:var(--ink-3);font-size:14px;font-weight:600;transition:background .15s,color .15s;}
  nav.side a svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;}
  nav.side a.active{background:var(--surface);color:var(--ink);}
  nav.side a.active svg{stroke:var(--slate);}
  nav.side .navtitle{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--ink-3);text-transform:uppercase;padding:8px 12px 4px;}

  /* toast */
  #toast{position:fixed;left:50%;bottom:calc(var(--safe-b) + 92px);transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 40px);max-width:420px;}
  .toast{background:var(--surface-3);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:13px;box-shadow:0 8px 30px -8px rgba(0,0,0,.6);animation:tin .25s ease;}
  .toast.pos{border-color:var(--pos-line);} .toast.neg{border-color:var(--neg-line);}
  @keyframes tin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .empty{text-align:center;color:var(--ink-3);padding:26px 16px;font-size:13.5px;}
  .empty b{display:block;color:var(--ink-2);font-size:15px;margin-bottom:6px;}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <span class="brand-dot"></span>
    <div class="brand"><b>BO CAPITAL OS</b><small id="cycle-tag">Chưa có chu kỳ</small></div>
    <div class="topbar-right">
      <span id="sync-pill" class="pill off">Offline</span>
    </div>
  </header>

  <nav class="side"></nav>

  <main id="view"></main>

  <nav class="tabbar" id="tabbar"></nav>
</div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================================
   BO CAPITAL OS  —  Binary-options discipline & edge-measurement PWA
   Single file · vanilla JS · IndexedDB (offline-first) · optional Supabase REST sync
   Single source of truth = trades[]. Rounds are reconstructed by roundId+seq.
   ========================================================================== */

/* ------------------------------ constants -------------------------------- */
const DB_NAME = "bo_capital_os";
const DB_VER  = 1;
const STORES  = ["cycles","trades","rule_breaks","meta"];

const DEFAULTS = {
  payout: 0.92,            // tỷ lệ trả thưởng của sàn
  divisor: 400,            // hệ số chia vốn -> Base = capital / divisor
  maxTier: 8,              // độ sâu thang martingale
  dailyTargetPct: 5,       // mục tiêu % lợi nhuận / ngày
  cycleDays: 30,           // số ngày / chu kỳ
  warningTier: 6,          // bắt đầu báo động rủi ro từ tầng
  maxRoundsPerDay: 20,     // cắt lỗ theo SỐ VÒNG / ngày
  bonusTurnoverX: 40,      // yêu cầu volume để rút bonus = bonus × X
  edgeMinSamples: 100,     // số mẫu tối thiểu để Edge Gate có hiệu lực
  supabaseUrl: "",
  supabaseKey: "",
};

const ROUTES = [
  {id:"dashboard", label:"Tổng quan", icon:iGrid},
  {id:"trade",     label:"Vào lệnh",  icon:iBolt},
  {id:"risk",      label:"Rủi ro",    icon:iShield},
  {id:"log",       label:"Nhật ký",   icon:iList},
  {id:"settings",  label:"Cấu hình",  icon:iGear},
];

/* ------------------------------ app state -------------------------------- */
const state = {
  settings: {...DEFAULTS},
  cycles: [],
  trades: [],
  ruleBreaks: [],
  activeRound: null,     // {roundId, cycleId, base, sizes:[], startEq}
  deviceId: null,
  override: false,       // bỏ qua khóa cho ĐÚNG 1 vòng kế tiếp
  draftStars: 0,
  draftNote: "",
  route: "dashboard",
  syncFp: null,
  syncTimer: null,
};

/* =============================== storage ================================ */
// Prefer IndexedDB. If it's blocked or non-functional (sandboxed preview
// iframe, Safari private mode, some in-app webviews) the open request can
// throw OR hang forever — so we race it against a timeout and transparently
// fall back to an in-memory store. The app then runs fully; only persistence
// is lost (we warn the user). This guarantees boot() never hangs.
let _db=null, MEM=null;

function openDB(){
  return new Promise((res,rej)=>{
    let req;
    try{ req = indexedDB.open(DB_NAME, DB_VER); }
    catch(e){ return rej(e); }               // some sandboxes throw synchronously
    req.onupgradeneeded = e=>{
      const d = e.target.result;
      for(const s of STORES){
        if(!d.objectStoreNames.contains(s)) d.createObjectStore(s, {keyPath: s==="meta" ? "key":"id"});
      }
    };
    req.onsuccess = ()=>res(req.result);
    req.onerror   = ()=>rej(req.error || new Error("idb open error"));
    req.onblocked = ()=>rej(new Error("idb blocked"));
  });
}
function withTimeout(p, ms){
  return Promise.race([ p, new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), ms)) ]);
}
async function initStorage(){
  if(typeof indexedDB==="undefined" || !indexedDB){ enableMemoryStore(); return; }
  try{ _db = await withTimeout(openDB(), 2500); }
  catch(e){ console.warn("IndexedDB không dùng được → bộ nhớ tạm:", e && e.message); enableMemoryStore(); }
}
function enableMemoryStore(){
  MEM={}; for(const s of STORES) MEM[s]=new Map();
  state._ephemeral=true;
}

function db(){ return Promise.resolve(_db); }
// Safari-safe: create the transaction and place the request in the SAME
// synchronous turn (no await in between, or the tx auto-commits and throws
// TransactionInactiveError). Resolve on `complete` so writes are durable
// before we continue — this is what makes the page-hide flush reliable.
function withStore(storeName, mode, run){
  return db().then(d => new Promise((res, rej) => {
    let r;
    const t = d.transaction(storeName, mode);
    t.oncomplete = () => res(r ? r.result : undefined);
    t.onabort    = () => rej(t.error || new Error("tx aborted"));
    t.onerror    = () => rej(t.error || new Error("tx error"));
    try { r = run(t.objectStore(storeName)); }
    catch(e){ rej(e); }
  }));
}
const memKey=(store,val)=> store==="meta" ? val.key : val.id;
async function put(store, val){ if(MEM){ MEM[store].set(memKey(store,val), val); return; } return withStore(store,"readwrite", s=>s.put(val)); }
async function del(store, key){ if(MEM){ MEM[store].delete(key); return; } return withStore(store,"readwrite", s=>s.delete(key)); }
async function all(store){ if(MEM){ return [...MEM[store].values()]; } return withStore(store,"readonly", s=>s.getAll()); }
async function clearStore(store){ if(MEM){ MEM[store].clear(); return; } return withStore(store,"readwrite", s=>s.clear()); }
async function getMeta(key){ if(MEM){ const r=MEM.meta.get(key); return r?r.value:undefined; } const rec = await withStore("meta","readonly", s=>s.get(key)); return rec?rec.value:undefined; }
async function setMeta(key,value){ return put("meta",{key,value}); }

async function loadAll(){
  const [cy,tr,rb] = await Promise.all([all("cycles"),all("trades"),all("rule_breaks")]);
  state.cycles = cy||[];
  state.trades = (tr||[]);
  state.ruleBreaks = rb||[];
  const s = await getMeta("settings"); if(s) state.settings = {...DEFAULTS, ...s};
  const ar = await getMeta("activeRound"); state.activeRound = ar||null;
  let dev = await getMeta("deviceId");
  if(!dev){ dev = uid(); await setMeta("deviceId",dev); }
  state.deviceId = dev;
  state.syncFp = await getMeta("syncFp");
}

/* =============================== helpers ================================= */
function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : "x"+Date.now().toString(36)+Math.random().toString(36).slice(2,9)); }
function nowSeq(){ return Date.now()*1000 + (nowSeq._c=((nowSeq._c||0)+1)%1000); }
function dayKey(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function todayKey(){ return dayKey(new Date()); }
function money(n){ const s=n<0?"-":""; return s+"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function money0(n){ const s=n<0?"-":""; return s+"$"+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); }
function pct(x,d=2){ return (x*100).toFixed(d)+"%"; }
function signed(n){ return (n>=0?"+":"")+money(n); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(d){ const x=new Date(d); return x.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit"}); }

function fmtDateFull(d){ const x=new Date(d); return x.toLocaleDateString("vi-VN",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"}); }

function toast(msg, kind=""){
  const box=document.getElementById("toast");
  const el=document.createElement("div");
  el.className="toast "+kind; el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); }, 2200);

/* =============================== engines ================================= */
// active cycle = most recent ACTIVE
function activeCycle(){
  const a = state.cycles.filter(c=>c.status==="ACTIVE").sort((x,y)=>y.startDate-x.startDate);
  return a[0] || null;
}
function tradesOf(cid){ return state.trades.filter(t=>t.cycleId===cid).sort((a,b)=>a.seq-b.seq); }
function cycleEquity(c){
  if(!c) return 0;
  const p = tradesOf(c.id).reduce((s,t)=>s+(t.pnl||0),0);
  return (c.deposit||0)+(c.bonus||0)+p;
}
function totalVolume(cid){ return tradesOf(cid).reduce((s,t)=>s+(t.size||0),0); }

// martingale ladder (RiskEngine) — matches spec: net win = +1 Base each tier
function ladder(capital, S){
  const base = capital>0 ? capital/S.divisor : 0;
  const rows=[]; let accum=0;
  for(let tier=1; tier<=S.maxTier; tier++){
    const size = base>0 ? (accum+base)/S.payout : 0;
    accum += size;
    rows.push({ tier, size, cumLoss:accum, pctCap: capital>0?accum/capital:0, net:base });
  }
  return {base, rows};
}

// EdgeEngine — per-trade win rate, break-even, EV
function edgeStats(trades){
  const S=state.settings;
  const n=trades.length;
  const wins=trades.filter(t=>t.result==="WIN").length;
  const wr = n? wins/n : 0;
  const be = 1/(S.payout+1);
  const ev = wr*S.payout - (1-wr);          // per $1
  let stateKey="insufficient";
  if(n>=S.edgeMinSamples) stateKey = wr>=be ? "positive":"negative";
  return {n,wins,losses:n-wins,wr,be,ev,stateKey};
}

// Reconstruct rounds from trades[] grouped by roundId, ordered by seq.
// result: WON (last trade WIN) | LOST (closed, all losses) | OPEN (== activeRound)
function reconstructRounds(trades){
  const openId = state.activeRound?.roundId;
  const map=new Map();
  for(const t of trades){
    if(!map.has(t.roundId)) map.set(t.roundId, []);
    map.get(t.roundId).push(t);
  }
  const rounds=[];
  for(const [rid,arr] of map){
    arr.sort((a,b)=>a.seq-b.seq);
    const last=arr[arr.length-1];
    let result;
    if(rid===openId) result="OPEN";
    else result = last.result==="WIN" ? "WON":"LOST";
    const pnl=arr.reduce((s,t)=>s+t.pnl,0);
    const winTier = result==="WON" ? arr.length : null;
    rounds.push({roundId:rid, cycleId:arr[0].cycleId, trades:arr, tiers:arr.length, result, pnl, winTier, start:arr[0].seq, date:arr[0].date});
  }
  rounds.sort((a,b)=>a.start-b.start);
  return rounds;
}

// win-by-tier distribution across won rounds
function tierDistribution(rounds){
  const S=state.settings, dist=new Array(S.maxTier).fill(0); let won=0;
  for(const r of rounds){ if(r.result==="WON"){ dist[r.winTier-1]++; won++; } }
  return {dist, won};
}

// discipline (RoundStateMachine gate) — pure function of current data
function discipline(){
  const c=activeCycle();
  const res={locked:false, reasons:[], target:0, dayPnl:0, roundsToday:0, edge:edgeStats(state.trades)};
  if(!c) return res;
  const eq=cycleEquity(c);
  const dt=tradesOf(c.id).filter(t=>dayKey(t.date)===todayKey());
  const dayPnl=dt.reduce((s,t)=>s+t.pnl,0);
  const startEq=eq-dayPnl;
  const target=startEq*(state.settings.dailyTargetPct/100);
  const roundsToday=reconstructRounds(dt).filter(r=>r.result!=="OPEN").length;
  res.target=target; res.dayPnl=dayPnl; res.roundsToday=roundsToday; res.startEq=startEq; res.eq=eq;

  if(target>0 && dayPnl>=target) res.reasons.push({t:"Đã đạt mục tiêu ngày", d:`Lãi ${money(dayPnl)} ≥ mục tiêu ${money(target)}. Dừng lại, bảo toàn thành quả.`});
  if(roundsToday>=state.settings.maxRoundsPerDay) res.reasons.push({t:"Chạm ngưỡng cắt lỗ số vòng", d:`Đã đánh ${roundsToday}/${state.settings.maxRoundsPerDay} vòng hôm nay. Ngưng để tránh phơi nhiễm thêm.`});
  const e=res.edge;
  if(e.n>=state.settings.edgeMinSamples && e.wr<e.be) res.reasons.push({t:"Edge Gate — lợi thế âm", d:`Win rate ${pct(e.wr)} dưới hòa vốn ${pct(e.be)} trên ${e.n} mẫu. Kỳ vọng âm: mỗi lệnh mất ${money(-e.ev)}/$1.`});

  res.locked = res.reasons.length>0;
  return res;
}

// live next-size for active round
function nextSizeInfo(){
  const c=activeCycle();
  if(!c) return null;
  const ar=state.activeRound;
  const base = ar ? ar.base : (cycleEquity(c)/state.settings.divisor);
  const accum = ar ? ar.sizes.reduce((s,x)=>s+x,0) : 0;
  const size = base>0 ? (accum+base)/state.settings.payout : 0;
  const tier = ar ? ar.sizes.length+1 : 1;
  return {size, tier, base, accum, capital:cycleEquity(c)};
}

/* ============================ state machine ============================= */
async function pressResult(kind){ // "WIN" | "LOSS"
  const c=activeCycle();
  if(!c){ toast("Hãy tạo chu kỳ trong Cấu hình trước.","neg"); return; }
  if(state._busy) return;                 // chống double-tap ghi trùng lệnh
  state._busy=true;
  try{
  const info=nextSizeInfo();
  const tier=info.tier;

  // open a new round if needed
  if(!state.activeRound){
    state.activeRound={ roundId:uid(), cycleId:c.id, base: cycleEquity(c)/state.settings.divisor, sizes:[], startEq:cycleEquity(c) };
  }
  const ar=state.activeRound;
  const size=(ar.sizes.reduce((s,x)=>s+x,0)+ar.base)/state.settings.payout;
  const pnl = kind==="WIN" ? size*state.settings.payout : -size;

  const trade={ id:uid(), seq:nowSeq(), cycleId:c.id, roundId:ar.roundId, tier,
                date:Date.now(), size:round2(size), result:kind, pnl:round2(pnl),
                notes: note() };
  state.trades.push(trade);
  await put("trades", trade);

  if(kind==="WIN"){
    await closeRound("WON");
    toast(`Vòng thắng ở tầng ${tier} · ${signed(pnl)}`,"pos");
  } else {
    ar.sizes.push(size);
    if(tier>=state.settings.maxTier){
      await closeRound("LOST");
      toast(`Cháy full ${tier} tầng · ${money(-ar.sizes.reduce((s,x)=>s+x,0))}`,"neg");
    } else {
      await setMeta("activeRound", ar);
      toast(`Thua tầng ${tier} · gấp thếp lên tầng ${tier+1}`,"");
    }
  }
  clearDraft();
  syncDebounced();
  render();
  } finally { state._busy=false; }
}

function note(){
  const s=state.draftStars, n=state.draftNote.trim();
  if(!s && !n) return "";
  return (s?("★".repeat(s)):"") + (n?(s?" | ":"")+n:"");
}
async function closeRound(){
  state.activeRound=null;
  await setMeta("activeRound", null);
  if(state.override) state.override=false; // override chỉ có hiệu lực 1 vòng
}
function round2(n){ return Math.round(n*100)/100; }

async function endRoundEarly(){
  if(!state.activeRound){ return; }
  const lost=state.activeRound.sizes.reduce((s,x)=>s+x,0);
  await closeRound("LOST");
  toast(lost>0?`Kết thúc vòng sớm · chốt lỗ ${money(-lost)}`:"Đã hủy vòng","");
  clearDraft(); syncDebounced(); render();
}

async function undo(){
  const c=activeCycle(); if(!c) return;
  const list=tradesOf(c.id);
  if(!list.length){ toast("Không có lệnh để hoàn tác.",""); return; }
  const last=list[list.length-1];
  state.trades=state.trades.filter(t=>t.id!==last.id);
  await del("trades", last.id);

  // rebuild active round from remaining trades of that round
  const rest=state.trades.filter(t=>t.roundId===last.roundId).sort((a,b)=>a.seq-b.seq);
  if(rest.length && rest[rest.length-1].result==="LOSS"){
    // reopen round (all remaining are losses)
    state.activeRound={ roundId:last.roundId, cycleId:c.id,
      base: (cycleEquity(c) - rest.reduce((s,t)=>s+t.pnl,0)) / state.settings.divisor, // eq before this round
      sizes: rest.map(t=>t.size), startEq:0 };
    // recompute base from equity at round start for correctness
    const before=state.trades.filter(t=>t.cycleId===c.id && t.seq<rest[0].seq).reduce((s,t)=>s+t.pnl,0);
    state.activeRound.base=((c.deposit||0)+(c.bonus||0)+before)/state.settings.divisor;
  } else {
    state.activeRound=null; // round emptied, or last remaining was a WIN (closed)
  }
  await setMeta("activeRound", state.activeRound);
  toast("Đã hoàn tác lệnh cuối.","");
  clearDraft(); syncDebounced(); render();
}

async function breakRule(){
  const rb={ id:uid(), date:Date.now(), reason:"edge_gate_bypass" };
  state.ruleBreaks.push(rb);
  await put("rule_breaks", rb);
  state.override=true;
  toast("Đã mở khóa 1 vòng — vi phạm được ghi lại.","neg");
  syncDebounced(); render();
}

// minimal dependency-free SVG line chart (2 series)
function lineChart(a, b, opt={}){
  const W=680,H=210,pl=44,pr=14,pt=14,pb=26;
  const xs=Math.max(a.length,b?b.length:0,2);
  const allV=[...a, ...(b||[])].filter(v=>isFinite(v));
  let min=Math.min(...allV), max=Math.max(...allV);
  if(!isFinite(min)){min=0;max=1;}
  if(min===max){min-=1;max+=1;}
  const pad=(max-min)*0.08; min-=pad; max+=pad;
  const X=i=> pl + (W-pl-pr)*(xs<=1?0:i/(xs-1));
  const Y=v=> pt + (H-pt-pb)*(1-(v-min)/(max-min));
  const path=arr=>arr.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+","+Y(v).toFixed(1)).join(" ");
  const grid=[0,.25,.5,.75,1].map(f=>{const y=pt+(H-pt-pb)*f;const val=max-(max-min)*f;
    return `<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#20272F"/><text x="${pl-6}" y="${y+3}" text-anchor="end" fill="#5D6875" font-size="9" font-family="monospace">${money0(val)}</text>`;}).join("");
  const areaB = b ? `<path d="${path(b)} L${X(b.length-1)},${H-pb} L${X(0)},${H-pb} Z" fill="url(#g1)" opacity=".5"/>`:"";
  return `<div class="chartwrap"><svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g1" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#3FB37F" stop-opacity=".28"/><stop offset="1" stop-color="#3FB37F" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    ${b?`<path d="${path(b)}" fill="none" stroke="#3FB37F" stroke-width="2"/>`:""}
    <path d="${path(a)}" fill="none" stroke="#5C7AA6" stroke-width="2" stroke-dasharray="5 4"/>
  </svg></div>
  <div class="legend"><span><i style="background:#5C7AA6"></i>${opt.aLabel||"Lý thuyết"}</span><span><i style="background:#3FB37F"></i>${opt.bLabel||"Thực tế"}</span></div>`;
}
function barChart(labels, values, opt={}){
  const W=680,H=170,pl=30,pr=10,pt=12,pb=28,n=values.length;
  const max=Math.max(...values,1);
  const bw=(W-pl-pr)/n*0.62, gap=(W-pl-pr)/n;
  const bars=values.map((v,i)=>{
    const h=(H-pt-pb)*(v/max), x=pl+gap*i+(gap-bw)/2, y=H-pb-h;
    const col=opt.warnFrom && (i+1)>=opt.warnFrom ? "#E0A03A" : "#3FB37F";
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(h,0).toFixed(1)}" rx="2" fill="${col}"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" fill="#9BA6B4" font-size="9" font-family="monospace">${v||""}</text>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-9}" text-anchor="middle" fill="#5D6875" font-size="9" font-family="monospace">${labels[i]}</text>`;
  }).join("");
  return `<div class="chartwrap"><svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg></div>`;
}
// Edge Gate meter (signature). scale 40%..60% win-rate
function edgeMeter(e){
  const lo=0.40, hi=0.60;
  const p=v=>clamp((v-lo)/(hi-lo),0,1)*100;
  const bePos=p(e.be), wrPos=p(e.wr);
  const col = e.stateKey==="positive"?"var(--pos)":e.stateKey==="negative"?"var(--neg)":"var(--warn)";
  return `<div class="gate">
    <div class="zone-neg" style="width:${bePos}%"></div>
    <div class="zone-pos" style="left:${bePos}%;width:${100-bePos}%"></div>
    <div class="tick" data-l="Hòa vốn ${pct(e.be)}" style="left:${bePos}%"></div>
    <div class="marker" style="left:${wrPos}%;background:${col};color:${col}"></div>
    <div class="mval" style="left:${wrPos}%;color:${col}">${pct(e.wr)}</div>
  </div>
  <div class="gate-scale"><span>40%</span><span>50%</span><span>60%</span></div>`;
}

    : `<span class="badge warn"><span class="dotled"></span>Chưa đủ mẫu</span>`;

  const edgeCard=`<div class="card">
    <h3>${iTarget} Lợi thế thống kê (Edge)</h3>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div class="stat"><span class="k">Win rate (${e.n} lệnh)</span><span class="v">${pct(e.wr)}</span></div>
      ${badge}
    </div>
    ${edgeMeter(e)}
    <div class="grid2" style="margin-top:14px">
      <div class="stat"><span class="k">Điểm hòa vốn</span><span class="v sm">${pct(e.be)}</span><span class="sub">payout ${pct(S.payout,0)}</span></div>
      <div class="stat"><span class="k">Kỳ vọng (EV) / $1</span><span class="v sm ${e.ev>=0?'pos':'neg'}">${(e.ev>=0?'+':'')}${money(e.ev)}</span><span class="sub">${e.ev>=0?'lãi kỳ vọng':'mất kỳ vọng'} mỗi $1</span></div>
    </div>
    ${e.stateKey==="negative"?`<div class="sep"></div><div style="font-size:12.5px;color:var(--neg);line-height:1.4">${iAlertInline} Với win rate hiện tại, mỗi $1 giao dịch kỳ vọng lỗ ${money(-e.ev)}. Không có "gấp thếp vô hạn" nào cứu được kỳ vọng âm — xem tab Rủi ro.</div>`:""}
  </div>`;

  if(!c) return `<section class="view"><div class="view-head"><span class="eyebrow">Expectancy</span><h2>Tổng quan</h2></div>${edgeCard}${noCycleInline()}</section>`;

  const eq=cycleEquity(c);
  const realized=eq-(c.deposit||0)-(c.bonus||0);
  const dt=tradesOf(c.id).filter(t=>dayKey(t.date)===todayKey());
  const dayPnl=dt.reduce((s,t)=>s+t.pnl,0);
  const startEq=eq-dayPnl;
  const target=startEq*(S.dailyTargetPct/100);
  const tProg=target>0?clamp(dayPnl/target,0,1):0;
  const vol=totalVolume(c.id);
  const req=(c.bonus||0)*S.bonusTurnoverX;
  const vProg=req>0?clamp(vol/req,0,1):1;

  const cycleCard=`<div class="card">
    <h3>${iCycle} Ngày & Chu kỳ</h3>
    <div class="pbar-row"><span>Mục tiêu ngày</span><span class="${dayPnl>=target?'pos':''}">${signed(dayPnl)} / ${money(target)}</span></div>
    <div class="pbar"><span class="${dayPnl>=target?'pos':dayPnl<0?'neg':'warn'}" style="width:${(tProg*100).toFixed(0)}%"></span></div>
    ${req>0?`<div class="pbar-row" style="margin-top:14px"><span>Turnover bonus (×${S.bonusTurnoverX})</span><span>${money0(vol)} / ${money0(req)}</span></div>
    <div class="pbar"><span style="width:${(vProg*100).toFixed(0)}%"></span></div>`:""}
    <div class="sep"></div>
    <div class="grid3">
      <div class="stat"><span class="k">Vốn hiện tại</span><span class="v sm">${money0(eq)}</span></div>
      <div class="stat"><span class="k">Lãi/Lỗ ròng</span><span class="v sm ${realized>=0?'pos':'neg'}">${signed(realized)}</span></div>
      <div class="stat"><span class="k">Net cash*</span><span class="v sm ${realized>=0?'pos':'neg'}">${signed(realized)}</span></div>
    </div>
    <div class="stat" style="margin-top:12px"><span class="sub">Nạp ${money0(c.deposit||0)} · Bonus ${money0(c.bonus||0)} · *Net cash = P/L đã ghi nhận (chưa có sổ rút tiền).</span></div>
  </div>`;

  // equity curve
  const {actual, theo, days}=equitySeries(c);
  const curveCard=`<div class="card">
    <h3>${iChart} Đường vốn (Equity Curve)</h3>
    ${days.length>=2?lineChart(theo, actual, {aLabel:`Lý thuyết +${S.dailyTargetPct}%/ngày`, bLabel:"Thực tế"}):`<div class="empty">Cần ít nhất 2 ngày dữ liệu để vẽ đường vốn.</div>`}
  </div>`;

  return `<section class="view"><div class="view-head"><span class="eyebrow">Expectancy</span><h2>Tổng quan</h2></div>${edgeCard}${cycleCard}${curveCard}</section>`;
}

function equitySeries(c){
  const t=tradesOf(c.id);
  const start=(c.deposit||0)+(c.bonus||0);
  const r=state.settings.dailyTargetPct/100;
  const first=new Date(c.startDate); first.setHours(0,0,0,0);
  const lastD=t.length? new Date(t[t.length-1].date): new Date();
  const end=new Date(Math.max(lastD.getTime(), Date.now())); end.setHours(0,0,0,0);
  const days=[]; const dayCap=Math.min(state.settings.cycleDays, 90);
  let cur=new Date(first);
  // cumulative pnl by day
  let idx=0, running=start;
  const actual=[], theo=[]; let i=0;
  while(cur<=end && days.length<dayCap+1){
    const k=dayKey(cur);
    // add all trades on this day
    let dpnl=0;
    for(const tr of t){ if(dayKey(tr.date)===k) dpnl+=tr.pnl; }
    running=start + t.filter(tr=>new Date(tr.date)<=endOfDay(cur)).reduce((s,tr)=>s+tr.pnl,0);
    actual.push(round2(running));
    theo.push(round2(start*Math.pow(1+r,i)));
    days.push(k); i++;
    cur=new Date(cur.getTime()+86400000);
  }
  return {actual, theo, days};
}
function endOfDay(d){ const x=new Date(d); x.setHours(23,59,59,999); return x; }

/* -------- /risk -------- */
function viewRisk(){
  const c=activeCycle();
  const S=state.settings;
  const cap = c ? cycleEquity(c) : 1000;
  const L=ladder(cap,S);
  const e=edgeStats(state.trades);
  const wrBase = e.n>=20 ? e.wr : 0.5044; // dùng WR thực nếu đủ mẫu, else mẫu tham chiếu

  const rows=L.rows.map(r=>{
    const danger=r.pctCap>0.40;
    return `<tr class="${danger?'danger':''}"><td>${r.tier}${danger?' ⚠':''}</td><td>${money(r.size)}</td><td class="neg">${money(-r.cumLoss)}</td><td>${pct(r.pctCap,1)}</td><td class="pos">+${money(r.net)}</td></tr>`;
  }).join("");

  // sensitivity table: P(ruin/round) = (1-wr)^depth, survival over 30d
  const roundsPerDay = estRoundsPerDay(c) || S.maxRoundsPerDay;
  const rounds30 = roundsPerDay*30;
  const offs=[-0.03,-0.02,-0.01,0,0.01,0.02];
  const baseRuin=Math.pow(1-wrBase, S.maxTier);
  const sens=offs.map(o=>{
    const wr=clamp(wrBase+o,0,1);
    const pr=Math.pow(1-wr,S.maxTier);
    const surv=Math.pow(1-pr, rounds30);
    const rel = baseRuin>0 ? (pr/baseRuin-1) : 0;
    return `<tr class="${o===0?'':''}"><td>${o===0?'<b style="color:var(--ink)">'+pct(wr)+' (nay)</b>':pct(wr)}</td><td>${(pr*100).toFixed(3)}%</td><td class="${surv>0.7?'pos':surv>0.4?'warn':'neg'}">${(surv*100).toFixed(1)}%</td><td class="${o<0?'neg':o>0?'pos':''}">${o===0?'—':(rel>=0?'+':'')+(rel*100).toFixed(0)+'%'}</td></tr>`;
  }).join("");

  // real drawdown: how many times reached deep tiers
  const rounds=reconstructRounds(state.trades);
  const deepCounts={};
  for(let d=S.warningTier; d<=S.maxTier; d++) deepCounts[d]=0;
  for(const r of rounds){ if(r.result!=="OPEN"){ const reached=r.tiers; for(let d=S.warningTier; d<=S.maxTier; d++) if(reached>=d) deepCounts[d]++; } }
  const ddRows=Object.keys(deepCounts).map(d=>`<div class="stat"><span class="k">Đã chạm tầng ${d}</span><span class="v sm ${deepCounts[d]>0?'warn':''}">${deepCounts[d]}</span><span class="sub">lần</span></div>`).join("");

  return `<section class="view"><div class="view-head"><span class="eyebrow">RiskEngine</span><h2>Rủi ro</h2></div>

  <div class="card"><h3>${iShieldSm} Ma trận Martingale</h3>
    <div class="stat" style="margin-bottom:10px"><span class="sub">Vốn ${money0(cap)} · Base ${money(L.base)} · payout ${pct(S.payout,0)} · vạch đỏ = lỗ lũy kế > 40% vốn</span></div>
    <div class="tbl-scroll"><table><thead><tr><th>Tầng</th><th>Trade size</th><th>Lỗ lũy kế</th><th>% Vốn</th><th>Lãi ròng</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>

  <div class="card"><h3>${iAlertSm} Độ nhạy Win Rate</h3>
    <div class="stat" style="margin-bottom:10px"><span class="sub">P(cháy 1 vòng) = (1 − WR)<sup>${S.maxTier}</sup> · Sống sót 30 ngày ≈ ${roundsPerDay} vòng/ngày × 30</span></div>
    <div class="tbl-scroll"><table><thead><tr><th>Win rate</th><th>P(cháy/vòng)</th><th>Sống sót 30N</th><th>Δ rủi ro</th></tr></thead><tbody>${sens}</tbody></table></div>
    <div class="sep"></div>
    <div style="font-size:12.5px;color:var(--ink-2);line-height:1.45">${iAlertInline} WR giảm chỉ <b>1%</b> làm xác suất cháy mỗi vòng tăng ~<b class="neg">${(()=>{const r1=Math.pow(1-clamp(wrBase-0.01,0,1),S.maxTier);return baseRuin>0?((r1/baseRuin-1)*100).toFixed(0):"—";})()}%</b>. Martingale không loại bỏ rủi ro — nó dồn nhiều lần thắng nhỏ đổi lấy một lần thua rất lớn.</div>
  </div>

  <div class="card"><h3>${iCycleSm} Drawdown thực tế</h3>
    <div class="grid3">${ddRows}</div>
  </div>
  </section>`;
}
function estRoundsPerDay(c){
  if(!c) return 0;
  const rounds=reconstructRounds(tradesOf(c.id)).filter(r=>r.result!=="OPEN");
  if(!rounds.length) return 0;
  const daysSet=new Set(rounds.map(r=>dayKey(r.date)));
  return Math.max(1, Math.round(rounds.length/daysSet.size));
}

/* -------- /log -------- */
function viewLog(){
  const S=state.settings;
  // group all trades by day
  const byDay=new Map();
  for(const t of state.trades){ const k=dayKey(t.date); if(!byDay.has(k)) byDay.set(k,[]); byDay.get(k).push(t); }
  const days=[...byDay.keys()].sort().reverse();

  if(!days.length && !state.ruleBreaks.length){
    return `<section class="view"><div class="view-head"><span class="eyebrow">History</span><h2>Nhật ký</h2></div><div class="card"><div class="empty"><b>Chưa có lệnh nào</b>Vào tab “Vào lệnh” để bắt đầu ghi nhận chuỗi Martingale.</div></div></section>`;
  }

  const dayCards=days.map(k=>{
    const t=byDay.get(k);
    const rounds=reconstructRounds(t);
    const closed=rounds.filter(r=>r.result!=="OPEN");
    const pnl=t.reduce((s,x)=>s+x.pnl,0);
    // target for that day (approx: use deposit-based start not stored per day -> use pct of that day's opening)
    const passed = pnl>0; const failed=pnl<0;
    const status = pnl>0?`<span class="badge pos">Lãi</span>`:pnl<0?`<span class="badge neg">Lỗ</span>`:`<span class="badge">Hòa</span>`;
    const {dist,won}=tierDistribution(rounds);

    const roundItems=rounds.map((r,i)=>{
      const seq=r.trades.map(t=>`<b class="${t.result==="WIN"?'W':'L'}">${t.result==="WIN"?'W':'L'}</b>`).join("");
      const res = r.result==="WON"?`thắng tầng ${r.winTier}`:r.result==="LOST"?`cháy ${r.tiers} tầng`:"đang chạy";
      const tradeLines=r.trades.map(t=>`<div class="tradeline"><span>${fmtTime(t.date)} · tầng ${t.tier} · ${money(t.size)}</span><span class="${t.result==="WIN"?'pos':'neg'}">${signed(t.pnl)}${t.notes?` · ${esc(t.notes)}`:''}</span></div>`).join("");
      return `<div class="acc lv2" data-acc><div class="acc-h" data-acc-h>
          <span class="chev">${iChev}</span>
          <div class="grow"><div class="t1"><span class="seq">${seq}</span> &nbsp;<span style="color:var(--ink-2);font-weight:500">${res}</span></div></div>
          <div class="${r.pnl>=0?'pos':'neg'} mono" style="font-size:13px;font-weight:700">${signed(r.pnl)}</div>
        </div><div class="acc-body">${tradeLines}</div></div>`;
    }).join("");

    const distBlock = won>0 ? `<div style="margin:6px 0 10px"><div class="t2" style="margin-bottom:6px">Phân bổ tầng thắng (${won} vòng)</div>${barChart(dist.map((_,i)=>i+1), dist, {warnFrom:S.warningTier})}</div>`:"";

    return `<div class="acc" data-acc><div class="acc-h" data-acc-h>
        <span class="chev">${iChev}</span>
        <div class="grow"><div class="t1">${fmtDateFull(k)}</div><div class="t2">${closed.length} vòng · ${t.length} lệnh</div></div>
        <div style="text-align:right"><div class="${pnl>=0?'pos':'neg'} mono" style="font-weight:700">${signed(pnl)}</div>${status}</div>
      </div><div class="acc-body">${distBlock}${roundItems}</div></div>`;
  }).join("");

  const breaks = state.ruleBreaks.length? `<div class="card"><h3>${iAlertSm} Vi phạm kỷ luật (${state.ruleBreaks.length})</h3>
    ${state.ruleBreaks.slice().reverse().map(b=>`<div class="tradeline"><span>${fmtDateFull(b.date)} ${fmtTime(b.date)}</span><span class="neg">${esc(reasonLabel(b.reason))}</span></div>`).join("")}</div>`:"";

  return `<section class="view"><div class="view-head"><span class="eyebrow">History</span><h2>Nhật ký</h2></div>${dayCards}${breaks}</section>`;
}
function reasonLabel(r){ return ({edge_gate_bypass:"Bỏ qua Edge Gate", reopen_session:"Mở lại phiên đã khóa"})[r]||r; }

/* =============================== render ================================== */
const VIEWS={dashboard:viewDashboard, trade:viewTrade, risk:viewRisk, log:viewLog, settings:viewSettings};
function render(){
  const v=document.getElementById("view");
  v.innerHTML=(VIEWS[state.route]||viewDashboard)();
  // nav active
  document.querySelectorAll("[data-route]").forEach(a=>a.classList.toggle("active", a.dataset.route===state.route));
  // cycle tag + sync pill
  const c=activeCycle();
  document.getElementById("cycle-tag").textContent = c? `Chu kỳ · ${money0(cycleEquity(c))}` : "Chưa có chu kỳ";
  const sp=document.getElementById("sync-pill");
  const synced=state.settings.supabaseUrl && state.settings.supabaseKey;
  sp.className="pill "+(synced?"live":"off");
  sp.textContent=synced?"Cloud sync":"Offline";
  bindView();

/* =============================== events ================================== */
function bindView(){
  const v=document.getElementById("view");
  // buttons
  v.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click", ()=>handleAct(el.dataset.act, el));
  });
  // stars
  v.querySelectorAll("[data-star]").forEach(b=>b.addEventListener("click",()=>{
    const n=+b.dataset.star; state.draftStars = state.draftStars===n?0:n;
    v.querySelectorAll("[data-star]").forEach(x=>{const on=+x.dataset.star<=state.draftStars; x.classList.toggle("on",on); x.textContent=on?"★":"☆";});
  }));
  const note=v.querySelector("#note");
  if(note) note.addEventListener("input",e=>state.draftNote=e.target.value);
  // accordions (event delegation, tolerate nesting)
  v.querySelectorAll("[data-acc-h]").forEach(hd=>{
    hd.addEventListener("click",e=>{ e.stopPropagation(); hd.closest("[data-acc]").classList.toggle("open"); });
  });
  const imp=v.querySelector("#importfile");
  if(imp) imp.addEventListener("change", onImportFile);
}

async function handleAct(act, el){
  switch(act){
    case "win": return pressResult("WIN");
    case "loss": return pressResult("LOSS");
    case "undo": return undo();
    case "endround": return endRoundEarly();
    case "breakrule": return breakRule();
    case "gosettings": case "gotosettings": go("settings"); return;
    case "newcycle": return newCycle();
    case "closecycle": return closeCycle();
    case "savesettings": return saveSettings();
    case "savesb": return saveSupabase();
    case "syncnow": return syncNow(true);
    case "export": return exportJSON();
    case "import": document.getElementById("importfile").click(); return;
    case "wipe": return wipe();
  }
}

async function newCycle(){
  const dep=parseFloat(document.getElementById("c-deposit").value)||0;
  const bon=parseFloat(document.getElementById("c-bonus").value)||0;
  // deactivate current
  const cur=activeCycle();
  if(cur){ cur.status="COMPLETED"; await put("cycles",cur); }
  const c={ id:uid(), startDate:Date.now(), deposit:dep, bonus:bon, status:"ACTIVE" };
  state.cycles.push(c); await put("cycles",c);
  state.activeRound=null; await setMeta("activeRound",null);
  toast("Đã tạo chu kỳ mới.","pos"); syncDebounced(); render();
}
async function closeCycle(){
  const c=activeCycle(); if(!c) return;
  if(!confirm("Kết thúc chu kỳ hiện tại? Dữ liệu lệnh vẫn được giữ lại.")) return;
  c.status="COMPLETED"; await put("cycles",c);
  state.activeRound=null; await setMeta("activeRound",null);
  toast("Đã kết thúc chu kỳ."); syncDebounced(); render();
}
async function saveSettings(){
  const S=state.settings;
  const g=(id,def)=>{ const v=parseFloat(document.getElementById(id).value); return isFinite(v)?v:def; };
  S.payout=clamp(g("s-payout",S.payout*100)/100,0.5,0.99);
  S.divisor=Math.max(1,Math.round(g("s-divisor",S.divisor)));
  S.maxTier=clamp(Math.round(g("s-maxTier",S.maxTier)),2,20);
  S.warningTier=clamp(Math.round(g("s-warningTier",S.warningTier)),1,S.maxTier);
  S.dailyTargetPct=clamp(g("s-dailyTargetPct",S.dailyTargetPct),0,100);
  S.cycleDays=clamp(Math.round(g("s-cycleDays",S.cycleDays)),1,365);
  S.maxRoundsPerDay=clamp(Math.round(g("s-maxRoundsPerDay",S.maxRoundsPerDay)),1,500);
  S.bonusTurnoverX=clamp(Math.round(g("s-bonusTurnoverX",S.bonusTurnoverX)),0,200);
  S.edgeMinSamples=clamp(Math.round(g("s-edgeMinSamples",S.edgeMinSamples)),1,10000);
  await setMeta("settings",S);
  toast("Đã lưu thông số.","pos"); syncDebounced(); render();
}
async function saveSupabase(){
  state.settings.supabaseUrl=document.getElementById("sb-url").value.trim().replace(/\/$/,"");
  state.settings.supabaseKey=document.getElementById("sb-key").value.trim();
  await setMeta("settings",state.settings);
  toast("Đã lưu cấu hình Supabase.","pos"); render();
}

/* --------------------------- export / import ---------------------------- */
function snapshot(){ return {version:1, exportedAt:new Date().toISOString(), settings:state.settings, cycles:state.cycles, trades:state.trades, rule_breaks:state.ruleBreaks}; }
function exportJSON(){
  const blob=new Blob([JSON.stringify(snapshot(),null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`bo-capital-os_${todayKey()}.json`;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Đã xuất dữ liệu JSON.","pos");
}
async function onImportFile(e){
  const f=e.target.files[0]; if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(!data.trades && !data.cycles) throw new Error("bad");
    if(!confirm("Nhập dữ liệu này? Các bản ghi trùng ID sẽ được ghi đè, phần còn lại giữ nguyên.")) return;
    for(const c of (data.cycles||[])) await put("cycles",c);
    for(const t of (data.trades||[])) await put("trades",t);
    for(const r of (data.rule_breaks||[])) await put("rule_breaks",r);
    if(data.settings){ state.settings={...DEFAULTS,...data.settings}; await setMeta("settings",state.settings); }
    await loadAll();
    toast("Đã nhập dữ liệu.","pos"); syncDebounced(); render();
  }catch(err){ toast("File không hợp lệ.","neg"); }
  e.target.value="";
}
async function wipe(){
  if(!confirm("Xóa TOÀN BỘ dữ liệu (chu kỳ, lệnh, vi phạm)? Không thể hoàn tác.")) return;
  if(!confirm("Chắc chắn chứ? Nên Export JSON trước khi xóa.")) return;
  for(const s of ["cycles","trades","rule_breaks"]) await clearStore(s);
  await setMeta("activeRound",null);
  state.cycles=[];state.trades=[];state.ruleBreaks=[];state.activeRound=null;
  toast("Đã xóa toàn bộ dữ liệu.","neg"); render();
}

/* ----------------------- Supabase REST sync (optional) ------------------ */
function fingerprint(){
  let s=state.trades.length+"|"+state.cycles.length+"|"+state.ruleBreaks.length;
  for(const t of state.trades) s+=t.id+t.pnl;
  // small hash
  let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; }
  return String(h);
}
function syncDebounced(){
  if(!(state.settings.supabaseUrl && state.settings.supabaseKey)) return;
  clearTimeout(state.syncTimer);
  state.syncTimer=setTimeout(()=>syncNow(false), 4000);
}
async function syncNow(manual){
  const S=state.settings;
  if(!(S.supabaseUrl && S.supabaseKey)){ if(manual) toast("Chưa cấu hình Supabase.","neg"); return; }
  const fp=fingerprint();
  if(!manual && fp===state.syncFp) return; // dedup: nothing changed
  const hdr={ "apikey":S.supabaseKey, "Authorization":"Bearer "+S.supabaseKey, "Content-Type":"application/json", "Prefer":"resolution=merge-duplicates,return=minimal" };
  const dev=state.deviceId;
  try{
    const tag=o=>({...o, device_id:dev});
    await pushTable("cycles", state.cycles.map(tag), hdr, S);
    await pushTable("trades", state.trades.map(tag), hdr, S);
    await pushTable("rule_breaks", state.ruleBreaks.map(tag), hdr, S);
    state.syncFp=fp; await setMeta("syncFp",fp);
    if(manual) toast("Đã đồng bộ lên Supabase.","pos");
  }catch(err){ if(manual) toast("Lỗi đồng bộ: "+err.message,"neg"); }
}
async function pushTable(table, rows, hdr, S){
  if(!rows.length) return;
  const r=await fetch(`${S.supabaseUrl}/rest/v1/${table}`,{method:"POST",headers:hdr,body:JSON.stringify(rows)});
  if(!r.ok) throw new Error(table+" "+r.status);
}

/* =============================== router ================================= */
function go(route){ location.hash="#/"+route; }
function readHash(){ const m=location.hash.match(/#\/(\w+)/); return (m&&VIEWS[m[1]])?m[1]:"dashboard"; }
window.addEventListener("hashchange",()=>{ state.route=readHash(); render(); });

/* build nav */
function buildNav(){
  const tab=document.getElementById("tabbar");
  const side=document.querySelector("nav.side");
  tab.innerHTML="";
  side.innerHTML=`<div class="navtitle">BO Capital OS</div>`;
  for(const r of ROUTES){
    const a=document.createElement("a"); a.href="#/"+r.id; a.dataset.route=r.id;
    a.innerHTML=`${r.icon()}<span class="lab">${r.label}</span>`;
    tab.appendChild(a);
    const s=document.createElement("a"); s.href="#/"+r.id; s.dataset.route=r.id;
    s.innerHTML=`${r.icon()}<span>${r.label}</span>`;
    side.appendChild(s);
  }
}

/* =============================== boot =================================== */
async function boot(){
  await initStorage();
  try{ await loadAll(); }
  catch(e){ console.error(e); }
  buildNav();
  state.route=readHash();
  render();
  if(state._ephemeral){
    toast("Chế độ xem thử: dữ liệu sẽ KHÔNG được lưu (trình duyệt/preview chặn lưu trữ). Mở bằng trình duyệt hoặc cài PWA để lưu lại.","neg");
  }
  // register SW (best-effort; fails silently in sandboxes / file://)
  if("serviceWorker" in navigator){
    try{ await navigator.serviceWorker.register("sw.js"); }catch(_){}
  }
  // best-effort cloud-sync flush on background (local writes are already durable)
  window.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="hidden") syncNow(false); });
}
boot();

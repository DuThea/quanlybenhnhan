  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a'
            }
          },
          boxShadow: {
            soft: '0 10px 30px rgba(15, 23, 42, 0.08)'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif']
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.96)' },
              '100%': { opacity: '1', transform: 'scale(1)' }
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateX(-20px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' }
            }
          },
          animation: {
            fadeIn: 'fadeIn 0.25s ease-out',
            scaleIn: 'scaleIn 0.2s ease-out',
            slideIn: 'slideIn 0.25s ease-out'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Inter, sans-serif; }
    .glass { backdrop-filter: blur(18px); background: rgba(255, 255, 255, 0.84); }
    .dark .glass { background: rgba(15, 23, 42, 0.8); }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, .45); border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    [data-view], [data-tab] { transition: all .2s ease; }
    .status-chip { display: inline-flex; align-items: center; gap: .375rem; border-radius: 999px; padding: .25rem .625rem; font-size: .75rem; font-weight: 600; }
    .skeleton { position: relative; overflow: hidden; background: rgba(148, 163, 184, 0.18); border-radius: 0.75rem; }
    .skeleton::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent); animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <div id="app" class="min-h-screen">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 flex w-72 -translate-x-full flex-col border-r border-slate-200 bg-white/90 px-4 py-5 shadow-soft transition-transform duration-300 dark:border-slate-800 dark:bg-slate-900/95 lg:translate-x-0">

      <nav class="flex-1 space-y-1 overflow-y-auto scrollbar-thin pr-1">

        <button data-view="invoices" class="nav-btn flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-left text-sm font-semibold text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">

          <button id="themeToggle" class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-slate-200 text-slate-600 transition hover:border-primary-200 hover:text-primary-600 dark:border-slate-700 dark:text-slate-200 dark:hover:border-primary-800">

    </aside>

    <div class="lg:pl-72">
      <header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80">
        <div class="flex flex-wrap items-center gap-4 px-4 py-4 sm:px-6 lg:px-8">
          <div class="flex items-center gap-3">
            <button id="openSidebarBtn" class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 text-slate-600 hover:border-primary-200 hover:text-primary-600 dark:border-slate-700 dark:text-slate-200 lg:hidden">
              <i class="fa-solid fa-bars"></i>
            </button>
            <div>
              <p class="text-xs font-medium uppercase tracking-[0.24em] text-primary-600">Hệ thống EMR</p>
              <h2 id="pageTitle" class="text-xl font-bold tracking-tight sm:text-2xl">Dashboard</h2>
            </div>
          </div>

          <div class="ml-auto flex flex-1 items-center justify-end gap-3">
            <div class="relative w-full max-w-xl">
              <i class="fa-solid fa-magnifying-glass pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input id="globalSearchInput" type="text" placeholder="Tìm kiếm toàn cục: tên, mã BN, chẩn đoán, thuốc, hóa đơn..." class="w-full rounded-2xl border border-slate-200 bg-slate-50 py-3 pl-11 pr-4 text-sm outline-none transition focus:border-primary-400 focus:bg-white focus:ring-4 focus:ring-primary-100 dark:border-slate-700 dark:bg-slate-900 dark:focus:ring-primary-900/40" />
            </div>
            <button id="exportInvoicesBtn" class="hidden rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:border-primary-200 hover:text-primary-600 dark:border-slate-700 dark:text-slate-200 md:inline-flex md:items-center md:gap-2">
              <i class="fa-solid fa-file-export"></i>Export hóa đơn

            <button id="addPatientTopBtn" class="rounded-2xl bg-primary-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-primary-600/20 transition hover:bg-primary-700">

            </button>

      <main class="px-4 py-6 sm:px-6 lg:px-8">
        <section id="globalSearchPanel" class="mb-6 hidden rounded-3xl border border-slate-200 bg-white p-5 shadow-soft dark:border-slate-800 dark:bg-slate-900">
          <div class="mb-4 flex items-center justify-between gap-4">
            <div>
              <h3 class="text-lg font-bold">Kết quả tìm kiếm toàn cục</h3>
              <p id="globalSearchMeta" class="text-sm text-slate-500 dark:text-slate-400"></p>
            </div>
            <button id="clearGlobalSearchBtn" class="rounded-xl border border-slate-200 px-3 py-2 text-sm font-medium hover:border-primary-200 hover:text-primary-600 dark:border-slate-700">Xóa tìm kiếm</button>
          </div>
          <div id="globalSearchResults" class="grid gap-3"></div>
        </section>

        <section id="dashboardView" class="view-panel space-y-6 animate-fadeIn"></section>
        <section id="patientsView" class="view-panel hidden space-y-6 animate-fadeIn"></section>
        <section id="appointmentsView" class="view-panel hidden space-y-6 animate-fadeIn"></section>
        <section id="invoicesView" class="view-panel hidden space-y-6 animate-fadeIn"></section>
        <section id="activityView" class="view-panel hidden space-y-6 animate-fadeIn"></section>
      </main>
    </div>
  </div>

  <div id="loadingOverlay" class="pointer-events-none fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/30">
    <div class="glass rounded-3xl border border-white/30 px-6 py-5 shadow-soft dark:border-slate-800">
      <div class="flex items-center gap-4">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-primary-100 border-t-primary-600"></div>
        <div>
          <p class="font-semibold">MediCare Pro đang xử lý</p>
          <p class="text-sm text-slate-500 dark:text-slate-400">Vui lòng chờ trong giây lát...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="modalRoot" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div id="modalBackdrop" class="absolute inset-0 bg-slate-950/60"></div>
    <div id="modalCard" class="relative z-10 max-h-[92vh] w-full max-w-4xl overflow-hidden rounded-[28px] bg-white shadow-soft dark:bg-slate-900 animate-scaleIn">
      <div id="modalContent" class="max-h-[92vh] overflow-y-auto scrollbar-thin"></div>
    </div>
  </div>

  <div id="toastContainer" class="fixed right-4 top-4 z-[60] flex w-[min(92vw,420px)] flex-col gap-3"></div>

  <script>
    // =========================
    // Tiện ích và hằng số chung
    // =========================
    const StorageKeys = {
      DATA: 'medicare-pro-db-v1',
      SETTINGS: 'medicare-pro-settings-v1'
    };

    const Utils = {
      currency(value) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND', maximumFractionDigits: 0 }).format(Number(value || 0));
      },
      date(value, options = {}) {
        if (!value) return 'N/A';
        return new Intl.DateTimeFormat('vi-VN', {
          dateStyle: options.dateStyle || 'medium',
          timeStyle: options.timeStyle || undefined
        }).format(new Date(value));
      },
      dateInput(value) {
        if (!value) return '';
        return new Date(value).toISOString().slice(0, 10);
      },
      dateTimeInput(value) {
        if (!value) return '';
        const date = new Date(value);
        const offset = date.getTimezoneOffset();
        return new Date(date.getTime() - offset * 60000).toISOString().slice(0, 16);
      },
      ageFromDob(dob) {
        if (!dob) return 0;
        const birth = new Date(dob);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const monthDiff = now.getMonth() - birth.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) age--;
        return Math.max(age, 0);
      },
      uid(prefix = 'id') {
        return `${prefix}_${crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)}`;
      },
      slug(text = '') {
        return text.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      },
      debounce(fn, wait = 200) {
        let timer;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), wait);
        };
      },
      nextPatientCode(patients) {
        const max = patients.reduce((acc, item) => {
          const num = Number(String(item.code || '').replace('BN', ''));
          return Number.isFinite(num) ? Math.max(acc, num) : acc;
        }, 0);
        return `BN${String(max + 1).padStart(4, '0')}`;
      },
      statusClasses(type, value) {
        const map = {
          risk: {
            High: 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300',
            Medium: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
            Low: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300'
          },
          appointment: {
            Scheduled: 'bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300',
            Completed: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
            Missed: 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300',
            Cancelled: 'bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-300'
          },
          invoice: {
            Paid: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
            Pending: 'bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300',
            Overdue: 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300'
          }
        };
        return map[type]?.[value] || 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300';
      }
    };

    const Validators = {
      required(value, label) {
        if (!String(value || '').trim()) throw new Error(`${label} là bắt buộc.`);
      },
      phone(value) {
        const clean = String(value || '').replace(/\s+/g, '');
        if (!/^(\+84|0)(3|5|7|8|9)\d{8}$/.test(clean)) throw new Error('Số điện thoại không hợp lệ.');
      },
      dob(value) {
        const date = new Date(value);
        const now = new Date();
        if (Number.isNaN(date.getTime()) || date > now) throw new Error('Ngày sinh không hợp lệ.');
        if (Utils.ageFromDob(value) > 120) throw new Error('Ngày sinh vượt quá giới hạn hợp lệ.');
      },
      positive(value, label) {
        if (Number(value) <= 0) throw new Error(`${label} phải lớn hơn 0.`);
      },
      appointmentDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) throw new Error('Ngày giờ hẹn không hợp lệ.');
      }
    };

    const Seed = {
      firstNames: ['Nguyễn', 'Trần', 'Lê', 'Phạm', 'Hoàng', 'Huỳnh', 'Vũ', 'Phan', 'Đặng', 'Bùi'],
      lastNames: ['An', 'Bình', 'Châu', 'Dương', 'Hà', 'Hân', 'Khánh', 'Linh', 'Minh', 'Nam', 'Ngọc', 'Phong', 'Quân', 'Trang', 'Vy'],
      diagnoses: ['Tăng huyết áp', 'Đái tháo đường type 2', 'Hen phế quản', 'Rối loạn mỡ máu', 'Thiếu máu nhẹ', 'Viêm dạ dày', 'Đau lưng mạn tính', 'Viêm mũi dị ứng', 'Suy giáp', 'Trào ngược dạ dày'],
      medications: ['Paracetamol 500mg', 'Metformin 500mg', 'Amlodipine 5mg', 'Atorvastatin 10mg', 'Omeprazole 20mg', 'Salbutamol Inhaler', 'Vitamin B12', 'Loratadine 10mg'],
      complaints: ['Mệt mỏi kéo dài', 'Ho khan về đêm', 'Đau đầu nhẹ', 'Khó thở khi gắng sức', 'Chóng mặt', 'Đau bụng âm ỉ', 'Đau khớp gối', 'Mất ngủ'],
      cities: ['TP.HCM', 'Hà Nội', 'Đà Nẵng', 'Cần Thơ', 'Biên Hòa', 'Huế', 'Nha Trang', 'Vũng Tàu'],
      genders: ['Nam', 'Nữ'],
      riskLevels: ['High', 'Medium', 'Low'],
      random(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; },
      pick(arr) { return arr[this.random(0, arr.length - 1)]; },
      create() {
        const patients = [];
        const visits = [];
        const medications = [];
        const appointments = [];
        const invoices = [];
        const logs = [];
        const now = new Date();

        for (let i = 1; i <= 42; i++) {
          const patientId = Utils.uid('pt');
          const first = this.pick(this.firstNames);
          const last = this.pick(this.lastNames);
          const age = this.random(18, 82);
          const dob = new Date(now.getFullYear() - age, this.random(0, 11), this.random(1, 28));
          const risk = age > 65 ? this.pick(['High', 'Medium']) : this.pick(this.riskLevels);
          const patient = {
            id: patientId,
            code: `BN${String(i).padStart(4, '0')}`,
            fullName: `${first} ${last}`,
            gender: this.pick(this.genders),
            dob: dob.toISOString(),
            phone: `0${this.pick(['3','5','7','8','9'])}${this.random(10000000, 99999999)}`,
            email: `${Utils.slug(first)}.${Utils.slug(last)}${i}@example.com`,
            address: `${this.random(12, 248)} ${this.pick(['Nguyễn Trãi', 'Lê Lợi', 'Võ Văn Tần', 'Điện Biên Phủ', 'Hai Bà Trưng'])}, ${this.pick(this.cities)}`,
            bloodType: this.pick(['A+', 'A-', 'B+', 'B-', 'AB+', 'O+', 'O-']),
            allergies: this.pick(['Không', 'Penicillin', 'Hải sản', 'Bụi nhà', 'NSAIDs']),
            chronicConditions: `${this.pick(this.diagnoses)}, ${this.pick(['Béo phì', 'Viêm xoang mạn', 'Tiền sử tim mạch', 'Không'])}`,
            emergencyContact: `${this.pick(this.firstNames)} ${this.pick(this.lastNames)} - 0${this.random(300000000, 999999999)}`,
            riskLevel: risk,
            notes: this.pick(['Cần theo dõi huyết áp tại nhà', 'Tuân thủ tái khám mỗi 3 tháng', 'Ưu tiên tư vấn dinh dưỡng', 'Theo dõi men gan định kỳ', 'Không có ghi chú đặc biệt']),
            createdAt: new Date(now.getTime() - this.random(1, 220) * 86400000).toISOString(),
            updatedAt: now.toISOString()
          };
          patients.push(patient);

          const visitCount = this.random(1, 4);
          for (let v = 0; v < visitCount; v++) {
            const visitDate = new Date(now.getTime() - this.random(1, 180) * 86400000);
            const visitId = Utils.uid('visit');
            const diagnosis = this.pick(this.diagnoses);
            visits.push({
              id: visitId,
              patientId,
              date: visitDate.toISOString(),
              doctor: this.pick(['BS. Nguyễn Minh', 'BS. Trần Hoàng', 'BS. Lê Hạnh', 'BS. Phạm Quỳnh']),
              complaint: this.pick(this.complaints),
              diagnosis,
              treatmentPlan: this.pick(['Theo dõi thêm 2 tuần', 'Điều chỉnh thuốc và xét nghiệm lại', 'Tư vấn thay đổi lối sống', 'Chuyển chuyên khoa tim mạch']),
              vitals: `HA ${this.random(110, 150)}/${this.random(70, 95)} mmHg, mạch ${this.random(65, 95)} bpm`,
              notes: this.pick(['Ổn định', 'Cần tái khám sớm', 'Đáp ứng điều trị tốt', 'Cần tư vấn thêm']),
              createdAt: visitDate.toISOString(),
              updatedAt: visitDate.toISOString()
            });

            const medCount = this.random(1, 3);
            for (let m = 0; m < medCount; m++) {
              medications.push({
                id: Utils.uid('med'),
                patientId,
                visitId,
                name: this.pick(this.medications),
                dosage: this.pick(['1 viên x 2 lần/ngày', '1 viên sáng sau ăn', '2 nhát khi khó thở', '1 viên tối trước ngủ']),
                frequency: this.pick(['5 ngày', '7 ngày', '14 ngày', '30 ngày']),
                instructions: this.pick(['Uống sau ăn', 'Không dùng cùng rượu bia', 'Theo dõi đường huyết', 'Tăng cường uống nước']),
                prescribedAt: visitDate.toISOString(),
                createdAt: visitDate.toISOString(),
                updatedAt: visitDate.toISOString()
              });
            }

            invoices.push({
              id: Utils.uid('inv'),
              patientId,
              visitId,
              invoiceNo: `INV${String(i).padStart(3, '0')}${String(v + 1).padStart(2, '0')}`,
              amount: this.random(180000, 2200000),
              status: this.pick(['Paid', 'Pending', 'Pending', 'Overdue']),
              issuedAt: visitDate.toISOString(),
              dueDate: new Date(visitDate.getTime() + this.random(5, 25) * 86400000).toISOString(),
              description: `Chi phí khám và điều trị - ${diagnosis}`,
              createdAt: visitDate.toISOString(),
              updatedAt: visitDate.toISOString()
            });
          }

          const apptCount = this.random(1, 3);
          for (let a = 0; a < apptCount; a++) {
            const offset = this.random(-15, 30);
            const apptDate = new Date(now.getTime() + offset * 86400000 + this.random(8, 17) * 3600000);
            appointments.push({
              id: Utils.uid('appt'),
              patientId,
              date: apptDate.toISOString(),
              department: this.pick(['Nội tổng quát', 'Tim mạch', 'Nội tiết', 'Hô hấp', 'Tiêu hóa']),
              doctor: this.pick(['BS. Nguyễn Minh', 'BS. Trần Hoàng', 'BS. Lê Hạnh', 'BS. Phạm Quỳnh']),
              reason: this.pick(['Tái khám', 'Theo dõi xét nghiệm', 'Đánh giá đáp ứng thuốc', 'Khám tổng quát']),
              status: apptDate > now ? 'Scheduled' : this.pick(['Completed', 'Missed', 'Cancelled']),
              notes: this.pick(['Mang theo kết quả xét nghiệm', 'Nhịn ăn sáng trước khám', 'Ưu tiên khám sớm', 'Không có ghi chú']),
              createdAt: now.toISOString(),
              updatedAt: now.toISOString()
            });
          }
        }

        logs.push({
          id: Utils.uid('log'),
          action: 'SYSTEM_SEED',
          message: 'Khởi tạo dữ liệu mẫu MediCare Pro lần đầu.',
          entityType: 'system',
          entityId: 'seed',
          createdAt: now.toISOString()
        });

        return { patients, visits, medications, appointments, invoices, logs };
      }
    };

    const DB = {
      state: null,
      load() {
        const existing = localStorage.getItem(StorageKeys.DATA);
        if (!existing) {
          this.state = Seed.create();
          this.save();
          return this.state;
        }
        this.state = JSON.parse(existing);
        return this.state;
      },
      save() { localStorage.setItem(StorageKeys.DATA, JSON.stringify(this.state)); },
      ensure() { if (!this.state) this.load(); return this.state; },
      settings() { return JSON.parse(localStorage.getItem(StorageKeys.SETTINGS) || '{"theme":"light"}'); },
      saveSettings(settings) { localStorage.setItem(StorageKeys.SETTINGS, JSON.stringify(settings)); },
      log(action, message, entityType, entityId) {
        this.ensure().logs.unshift({ id: Utils.uid('log'), action, message, entityType, entityId, createdAt: new Date().toISOString() });
        this.state.logs = this.state.logs.slice(0, 150);
        this.save();
      },
      list(type) { return [...this.ensure()[type]]; },
      getById(type, id) { return this.ensure()[type].find(item => item.id === id); },
      upsert(type, data) {
        const now = new Date().toISOString();
        const collection = this.ensure()[type];
        if (data.id) {
          const index = collection.findIndex(item => item.id === data.id);
          if (index !== -1) {
            collection[index] = { ...collection[index], ...data, updatedAt: now };
            this.save();
            return collection[index];
          }
        }
        const payload = { ...data, id: Utils.uid(type.slice(0, 3)), createdAt: now, updatedAt: now };
        collection.unshift(payload);
        this.save();
        return payload;
      },
      remove(type, id) {
        const collection = this.ensure()[type];
        const index = collection.findIndex(item => item.id === id);
        if (index === -1) return false;
        const [deleted] = collection.splice(index, 1);
        if (type === 'patients') {
          ['visits', 'medications', 'appointments', 'invoices'].forEach(key => {
            this.state[key] = this.state[key].filter(item => item.patientId !== id);
          });
        }
        if (type === 'visits') {
          this.state.medications = this.state.medications.filter(item => item.visitId !== id);
          this.state.invoices = this.state.invoices.filter(item => item.visitId !== id);
        }
        this.save();
        return deleted;
      },
      selectors: {
        patientBundle(patientId) {
          const db = DB.ensure();
          return {
            patient: db.patients.find(p => p.id === patientId),
            visits: db.visits.filter(v => v.patientId === patientId).sort((a, b) => new Date(b.date) - new Date(a.date)),
            medications: db.medications.filter(m => m.patientId === patientId).sort((a, b) => new Date(b.prescribedAt) - new Date(a.prescribedAt)),
            appointments: db.appointments.filter(a => a.patientId === patientId).sort((a, b) => new Date(a.date) - new Date(b.date)),
            invoices: db.invoices.filter(i => i.patientId === patientId).sort((a, b) => new Date(b.issuedAt) - new Date(a.issuedAt))
          };
        }
      }
    };

    DB.selectors.dashboard = function () {
      const db = DB.ensure();
      const now = new Date();
      const currentYear = now.getFullYear();
      const patients = db.patients;
      const appointments = db.appointments;
      const invoices = db.invoices;
      const visits = db.visits;
      const upcomingAppointments = appointments
        .filter(item => new Date(item.date) >= now && item.status === 'Scheduled')
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .slice(0, 6);
      const monthlyRevenue = Array.from({ length: 12 }, (_, month) => invoices
        .filter(inv => inv.status === 'Paid' && new Date(inv.issuedAt).getFullYear() === currentYear && new Date(inv.issuedAt).getMonth() === month)
        .reduce((sum, inv) => sum + Number(inv.amount), 0));
      const monthlyVisits = Array.from({ length: 12 }, (_, month) => visits
        .filter(v => new Date(v.date).getFullYear() === currentYear && new Date(v.date).getMonth() === month).length);

      return {
        totalPatients: patients.length,
        highRisk: patients.filter(p => p.riskLevel === 'High').length,
        mediumRisk: patients.filter(p => p.riskLevel === 'Medium').length,
        lowRisk: patients.filter(p => p.riskLevel === 'Low').length,
        upcomingCount: upcomingAppointments.length,
        paidRevenue: invoices.filter(i => i.status === 'Paid').reduce((sum, i) => sum + Number(i.amount), 0),
        pendingRevenue: invoices.filter(i => i.status !== 'Paid').reduce((sum, i) => sum + Number(i.amount), 0),
        upcomingAppointments,
        monthlyRevenue,
        monthlyVisits
      };
    };

    DB.selectors.globalSearch = function (keyword) {
      const q = Utils.slug(keyword.trim());
      if (!q) return [];
      const db = DB.ensure();
      const patientMap = new Map(db.patients.map(p => [p.id, p]));
      const results = [];

      db.patients.forEach(patient => {
        const hay = Utils.slug([patient.code, patient.fullName, patient.phone, patient.address, patient.notes, patient.chronicConditions].join(' '));
        if (hay.includes(q)) results.push({ type: 'patient', title: patient.fullName, subtitle: `${patient.code} • ${patient.phone}`, patientId: patient.id, icon: 'fa-user-injured' });
      });

      db.visits.forEach(visit => {
        const hay = Utils.slug([visit.diagnosis, visit.complaint, visit.doctor, visit.notes].join(' '));
        if (hay.includes(q)) {
          const patient = patientMap.get(visit.patientId);
          results.push({ type: 'visit', title: visit.diagnosis, subtitle: `${patient?.fullName || 'N/A'} • ${Utils.date(visit.date)}`, patientId: visit.patientId, icon: 'fa-stethoscope' });
        }
      });

      db.medications.forEach(med => {
        const hay = Utils.slug([med.name, med.dosage, med.instructions].join(' '));
        if (hay.includes(q)) {
          const patient = patientMap.get(med.patientId);
          results.push({ type: 'medication', title: med.name, subtitle: `${patient?.fullName || 'N/A'} • ${med.dosage}`, patientId: med.patientId, icon: 'fa-pills' });
        }
      });

      db.invoices.forEach(inv => {
        const hay = Utils.slug([inv.invoiceNo, inv.description, inv.status].join(' '));
        if (hay.includes(q)) {
          const patient = patientMap.get(inv.patientId);
          results.push({ type: 'invoice', title: inv.invoiceNo, subtitle: `${patient?.fullName || 'N/A'} • ${Utils.currency(inv.amount)}`, patientId: inv.patientId, icon: 'fa-file-invoice-dollar' });
        }
      });

      return results.slice(0, 20);
    };

              <div class="md:col-span-2">${this.fieldTextarea('notes', 'Ghi chú', appt?.notes || '')}</div>
            </div>
            <div class="mt-8 flex justify-end gap-3"><button type="button" data-modal-close class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold dark:border-slate-700">Hủy</button><button class="rounded-2xl bg-primary-600 px-5 py-3 text-sm font-semibold text-white hover:bg-primary-700">${appt ? 'Lưu thay đổi' : 'Tạo lịch hẹn'}</button></div>
          </form>`);
      },
      openInvoiceModal(invoiceId = null, patientId = this.state.selectedPatientId) {
        const invoice = invoiceId ? DB.getById('invoices', invoiceId) : null;
        const patients = DB.list('patients').sort((a, b) => a.fullName.localeCompare(b.fullName, 'vi'));
        const visits = patientId ? DB.list('visits').filter(v => v.patientId === patientId) : DB.list('visits');
        UI.openModal(`
          <form id="invoiceForm" class="p-6 sm:p-7">
            <input type="hidden" name="id" value="${invoice?.id || ''}">
            <div class="flex items-start justify-between gap-4"><div><p class="text-xs font-semibold uppercase tracking-[0.24em] text-primary-600">Viện phí</p><h3 class="mt-2 text-2xl font-bold">${invoice ? 'Cập nhật hóa đơn' : 'Tạo hóa đơn mới'}</h3><p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Theo dõi doanh thu, công nợ và hạn thanh toán chính xác.</p></div><button type="button" data-modal-close class="rounded-2xl p-3 hover:bg-slate-100 dark:hover:bg-slate-800"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="mt-6 grid gap-4 md:grid-cols-2">
              ${this.fieldSelect('patientId', 'Bệnh nhân', patients.map(p => ({ value: p.id, label: `${p.fullName} • ${p.code}` })), invoice?.patientId || patientId || patients[0]?.id || '', false, true)}
              ${this.fieldSelect('visitId', 'Lượt khám liên quan', [{ value: '', label: 'Không liên kết' }, ...visits.slice(0, 50).map(v => ({ value: v.id, label: `${Utils.date(v.date)} - ${v.diagnosis}` }))], invoice?.visitId || '', false, true)}
              ${this.fieldText('invoiceNo', 'Số hóa đơn', invoice?.invoiceNo || `INV${Date.now().toString().slice(-8)}`)}
              ${this.fieldText('amount', 'Số tiền (VND)', invoice?.amount || '', false, 'number')}
              ${this.fieldSelect('status', 'Trạng thái', ['Paid', 'Pending', 'Overdue'], invoice?.status || 'Pending')}
              ${this.fieldDate('issuedAt', 'Ngày phát hành', Utils.dateInput(invoice?.issuedAt || new Date().toISOString()))}
              ${this.fieldDate('dueDate', 'Hạn thanh toán', Utils.dateInput(invoice?.dueDate || new Date(Date.now() + 7 * 86400000).toISOString()))}
              <div class="md:col-span-2">${this.fieldTextarea('description', 'Mô tả', invoice?.description || '')}</div>
            </div>
            <div class="mt-8 flex justify-end gap-3"><button type="button" data-modal-close class="rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold dark:border-slate-700">Hủy</button><button class="rounded-2xl bg-primary-600 px-5 py-3 text-sm font-semibold text-white hover:bg-primary-700">${invoice ? 'Lưu thay đổi' : 'Tạo hóa đơn'}</button></div>
          </form>`);
      },
      deleteEntity(type, id, label) {
        UI.confirmDelete({ title: `Xóa ${label}`, message: `Bạn có chắc muốn xóa ${label} này không? Thao tác này sẽ cập nhật lại dữ liệu liên quan trong hồ sơ EMR.`, onConfirm: () => {
          DB.remove(type, id);
          DB.log('DELETE', `Đã xóa ${label}.`, type.slice(0, -1), id);
          if (type === 'patients' && this.state.selectedPatientId === id) this.state.selectedPatientId = null;
          UI.toast(`Đã xóa ${label}.`, 'success');
          this.renderAll();
        }});
      },
      updateAppointmentStatus(id, status) {
        const appt = DB.getById('appointments', id);
        if (!appt || appt.status === status) return;
        DB.upsert('appointments', { ...appt, status });
        DB.log('STATUS_CHANGE', `Đổi trạng thái lịch hẹn sang ${status}.`, 'appointment', id);
        UI.toast('Đã cập nhật trạng thái lịch hẹn.', 'success');
        this.renderAll();
      },
      updateInvoiceStatus(id, status) {
        const invoice = DB.getById('invoices', id);
        if (!invoice || invoice.status === status) return;
        DB.upsert('invoices', { ...invoice, status });
        DB.log('STATUS_CHANGE', `Đổi trạng thái hóa đơn sang ${status}.`, 'invoice', id);
        UI.toast('Đã cập nhật trạng thái hóa đơn.', 'success');
        this.renderAll();
      },
      bindDynamicEvents() {
        document.querySelectorAll('[data-open-patient]').forEach(btn => btn.addEventListener('click', () => this.focusPatient(btn.dataset.openPatient, btn.dataset.openPatientTab || 'overview')));
        document.querySelectorAll('[data-empty-action="new-patient"]').forEach(btn => btn.addEventListener('click', () => { this.openPatientModal(); this.bindFormSubmitters(); }));
        document.querySelectorAll('[data-empty-action="new-appointment"]').forEach(btn => btn.addEventListener('click', () => { this.openAppointmentModal(); this.bindFormSubmitters(); }));
        document.querySelectorAll('[data-empty-action="new-visit"]').forEach(btn => btn.addEventListener('click', () => { this.openVisitModal(); this.bindFormSubmitters(); }));
        document.querySelectorAll('[data-empty-action="new-medication"]').forEach(btn => btn.addEventListener('click', () => { this.openMedicationModal(); this.bindFormSubmitters(); }));
        document.querySelectorAll('[data-empty-action="new-invoice"]').forEach(btn => btn.addEventListener('click', () => { this.openInvoiceModal(); this.bindFormSubmitters(); }));
      },
      bindFormSubmitters() {
        const patientForm = document.getElementById('patientForm');
        if (patientForm) patientForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            const data = Object.fromEntries(new FormData(patientForm).entries());
            const existing = data.id ? DB.getById('patients', data.id) : null;
            Validators.required(data.fullName, 'Họ và tên'); Validators.required(data.address, 'Địa chỉ'); Validators.required(data.phone, 'Số điện thoại'); Validators.phone(data.phone); Validators.dob(data.dob);
            const payload = { ...(existing || {}), ...data, code: data.code, dob: new Date(data.dob).toISOString(), email: data.email || '', notes: data.notes || '' };
            const saved = DB.upsert('patients', payload);
            DB.log(existing ? 'UPDATE' : 'CREATE', `${existing ? 'Cập nhật' : 'Tạo'} hồ sơ bệnh nhân ${saved.fullName}.`, 'patient', saved.id);
            this.state.selectedPatientId = saved.id; UI.closeModal(); UI.toast(existing ? 'Đã cập nhật hồ sơ bệnh nhân.' : 'Đã tạo bệnh nhân mới.', 'success'); this.renderAll();
          } catch (error) { UI.toast(error.message, 'error'); }
        });

        const visitForm = document.getElementById('visitForm');
        if (visitForm) visitForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            const data = Object.fromEntries(new FormData(visitForm).entries());
            Validators.required(data.diagnosis, 'Chẩn đoán'); Validators.required(data.complaint, 'Lý do khám');
            const existing = data.id ? DB.getById('visits', data.id) : null;
            DB.upsert('visits', { ...(existing || {}), ...data, date: new Date(data.date).toISOString() });
            DB.log(existing ? 'UPDATE' : 'CREATE', 'Đã lưu lượt khám.', 'visit', data.patientId); UI.closeModal(); UI.toast('Đã lưu lượt khám.', 'success'); this.renderAll();
          } catch (error) { UI.toast(error.message, 'error'); }
        });

        const medForm = document.getElementById('medForm');
        if (medForm) medForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            const data = Object.fromEntries(new FormData(medForm).entries());
            Validators.required(data.name, 'Tên thuốc'); Validators.required(data.dosage, 'Liều dùng');
            const existing = data.id ? DB.getById('medications', data.id) : null;
            DB.upsert('medications', { ...(existing || {}), ...data, prescribedAt: new Date(data.prescribedAt).toISOString() });
            DB.log(existing ? 'UPDATE' : 'CREATE', 'Đã lưu đơn thuốc.', 'medication', data.patientId); UI.closeModal(); UI.toast('Đã lưu đơn thuốc.', 'success'); this.renderAll();
          } catch (error) { UI.toast(error.message, 'error'); }
        });

        const appointmentForm = document.getElementById('appointmentForm');
        if (appointmentForm) appointmentForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            const data = Object.fromEntries(new FormData(appointmentForm).entries());
            Validators.required(data.reason, 'Lý do hẹn'); Validators.appointmentDate(data.date);
            const existing = data.id ? DB.getById('appointments', data.id) : null;
            DB.upsert('appointments', { ...(existing || {}), ...data, date: new Date(data.date).toISOString() });
            DB.log(existing ? 'UPDATE' : 'CREATE', 'Đã lưu lịch hẹn.', 'appointment', data.patientId); UI.closeModal(); UI.toast('Đã lưu lịch hẹn.', 'success'); this.renderAll();
          } catch (error) { UI.toast(error.message, 'error'); }
        });

        const invoiceForm = document.getElementById('invoiceForm');
        if (invoiceForm) invoiceForm.addEventListener('submit', (e) => {
          e.preventDefault();
          try {
            const data = Object.fromEntries(new FormData(invoiceForm).entries());
            Validators.required(data.invoiceNo, 'Số hóa đơn'); Validators.required(data.description, 'Mô tả'); Validators.positive(data.amount, 'Số tiền');
            const existing = data.id ? DB.getById('invoices', data.id) : null;
            DB.upsert('invoices', { ...(existing || {}), ...data, amount: Number(data.amount), issuedAt: new Date(data.issuedAt).toISOString(), dueDate: new Date(data.dueDate).toISOString() });
            DB.log(existing ? 'UPDATE' : 'CREATE', 'Đã lưu hóa đơn.', 'invoice', data.patientId); UI.closeModal(); UI.toast('Đã lưu hóa đơn.', 'success'); this.renderAll();
          } catch (error) { UI.toast(error.message, 'error'); }
        });
      },
      bindEvents() {
        document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => { this.switchView(btn.dataset.view); this.closeSidebar(); }));
        UI.els.openSidebarBtn.addEventListener('click', () => this.openSidebar());
        UI.els.closeSidebarBtn.addEventListener('click', () => this.closeSidebar());
        UI.els.mobileOverlay.addEventListener('click', () => this.closeSidebar());
        UI.els.themeToggle.addEventListener('click', () => { this.state.theme = this.state.theme === 'dark' ? 'light' : 'dark'; DB.saveSettings({ theme: this.state.theme }); this.applyTheme(); });
        document.getElementById('addPatientTopBtn').addEventListener('click', () => { this.openPatientModal(); this.bindFormSubmitters(); });
        document.getElementById('exportInvoicesBtn').addEventListener('click', () => { Exporter.invoicesCSV(); DB.log('EXPORT', 'Xuất danh sách hóa đơn CSV.', 'invoice', 'all'); UI.toast('Đã export danh sách hóa đơn CSV.', 'success'); });
        UI.els.globalSearchInput.addEventListener('input', Utils.debounce((e) => { this.state.globalSearchKeyword = e.target.value; this.renderGlobalSearch(); this.bindDynamicEvents(); }, 180));
        UI.els.clearGlobalSearchBtn.addEventListener('click', () => { UI.els.globalSearchInput.value = ''; this.state.globalSearchKeyword = ''; this.renderGlobalSearch(); });
        UI.els.modalBackdrop.addEventListener('click', () => UI.closeModal());
        document.addEventListener('click', (e) => { if (e.target.closest('[data-modal-close]')) UI.closeModal(); });

        document.addEventListener('click', (e) => {
          const openPatient = e.target.closest('[data-open-patient]');
          if (openPatient) { this.focusPatient(openPatient.dataset.openPatient, openPatient.dataset.openPatientTab || 'overview'); return; }
          const tabBtn = e.target.closest('[data-patient-tab]'); if (tabBtn) { this.state.patientDetailTab = tabBtn.dataset.patientTab; this.renderPatients(); this.bindDynamicEvents(); return; }
          const riskBtn = e.target.closest('[data-risk-filter]'); if (riskBtn) { this.state.patientRiskFilter = riskBtn.dataset.riskFilter; this.state.patientPage = 1; this.renderPatients(); this.bindDynamicEvents(); return; }
          const apptTabBtn = e.target.closest('[data-appointment-tab]'); if (apptTabBtn) { this.state.appointmentTab = apptTabBtn.dataset.appointmentTab; this.renderAppointments(); this.bindDynamicEvents(); return; }
          const invoiceFilterBtn = e.target.closest('[data-invoice-filter]'); if (invoiceFilterBtn) { this.state.invoiceFilter = invoiceFilterBtn.dataset.invoiceFilter; this.renderInvoices(); this.bindDynamicEvents(); return; }
          const editPatient = e.target.closest('[data-edit-patient]'); if (editPatient) { this.openPatientModal(editPatient.dataset.editPatient); this.bindFormSubmitters(); return; }
          const deletePatient = e.target.closest('[data-delete-patient]'); if (deletePatient) return this.deleteEntity('patients', deletePatient.dataset.deletePatient, 'bệnh nhân');
          const exportPatient = e.target.closest('[data-export-patient]'); if (exportPatient) { const patient = DB.getById('patients', exportPatient.dataset.exportPatient); Exporter.patientsJSON(patient); DB.log('EXPORT', `Xuất hồ sơ EMR bệnh nhân ${patient.fullName}.`, 'patient', patient.id); return UI.toast(`Đã export hồ sơ ${patient.code}.`, 'success'); }
          const editVisit = e.target.closest('[data-edit-visit]'); if (editVisit) { this.openVisitModal(editVisit.dataset.editVisit); this.bindFormSubmitters(); return; }
          const deleteVisit = e.target.closest('[data-delete-visit]'); if (deleteVisit) return this.deleteEntity('visits', deleteVisit.dataset.deleteVisit, 'lượt khám');
          const editMed = e.target.closest('[data-edit-med]'); if (editMed) { this.openMedicationModal(editMed.dataset.editMed); this.bindFormSubmitters(); return; }
          const deleteMed = e.target.closest('[data-delete-med]'); if (deleteMed) return this.deleteEntity('medications', deleteMed.dataset.deleteMed, 'đơn thuốc');
          const printMed = e.target.closest('[data-print-med]'); if (printMed) { const med = DB.getById('medications', printMed.dataset.printMed); const patient = DB.getById('patients', med.patientId); const visit = med.visitId ? DB.getById('visits', med.visitId) : null; return Print.prescription(med, patient, visit); }
          const editAppt = e.target.closest('[data-edit-appointment]'); if (editAppt) { this.openAppointmentModal(editAppt.dataset.editAppointment); this.bindFormSubmitters(); return; }
          const deleteAppt = e.target.closest('[data-delete-appointment]'); if (deleteAppt) return this.deleteEntity('appointments', deleteAppt.dataset.deleteAppointment, 'lịch hẹn');
          const apptStatus = e.target.closest('[data-appointment-status]'); if (apptStatus) { const [id, status] = apptStatus.dataset.appointmentStatus.split(':'); return this.updateAppointmentStatus(id, status); }
          const editInv = e.target.closest('[data-edit-invoice]'); if (editInv) { this.openInvoiceModal(editInv.dataset.editInvoice); this.bindFormSubmitters(); return; }
          const deleteInv = e.target.closest('[data-delete-invoice]'); if (deleteInv) return this.deleteEntity('invoices', deleteInv.dataset.deleteInvoice, 'hóa đơn');
          const invStatus = e.target.closest('[data-invoice-status]'); if (invStatus) { const [id, status] = invStatus.dataset.invoiceStatus.split(':'); return this.updateInvoiceStatus(id, status); }
        });

        document.addEventListener('input', (e) => {
          if (e.target.id === 'patientSearchInput') { this.state.patientSearch = e.target.value; this.state.patientPage = 1; this.renderPatients(); this.bindDynamicEvents(); }
        });
        document.addEventListener('click', (e) => {
          if (e.target.id === 'newPatientBtn') { this.openPatientModal(); this.bindFormSubmitters(); }
          if (e.target.id === 'newVisitBtn') { this.openVisitModal(); this.bindFormSubmitters(); }
          if (e.target.id === 'newMedBtn') { this.openMedicationModal(); this.bindFormSubmitters(); }
          if (e.target.id === 'newPatientApptBtn' || e.target.id === 'newAppointmentBtn') { this.openAppointmentModal(); this.bindFormSubmitters(); }
          if (e.target.id === 'newInvoiceBtn' || e.target.id === 'newInvoiceGlobalBtn') { this.openInvoiceModal(); this.bindFormSubmitters(); }
          if (e.target.id === 'exportPatientsAllBtn') { const patient = this.state.selectedPatientId ? DB.getById('patients', this.state.selectedPatientId) : this.getFilteredPatients()[0]; if (patient) { Exporter.patientsJSON(patient); DB.log('EXPORT', `Xuất hồ sơ EMR bệnh nhân ${patient.fullName}.`, 'patient', patient.id); UI.toast(`Đã export hồ sơ ${patient.code}.`, 'success'); } }
          if (e.target.id === 'prevPatientPageBtn') { this.state.patientPage = Math.max(1, this.state.patientPage - 1); this.renderPatients(); this.bindDynamicEvents(); }
          if (e.target.id === 'nextPatientPageBtn') { const totalPages = Math.max(1, Math.ceil(this.getFilteredPatients().length / this.state.patientPageSize)); this.state.patientPage = Math.min(totalPages, this.state.patientPage + 1); this.renderPatients(); this.bindDynamicEvents(); }
        });
      },
      init() {
        DB.load(); UI.init();
        this.state.theme = DB.settings().theme || 'light';
        this.applyTheme();
        this.bindEvents();
        this.renderAll();
        this.bindDynamicEvents();
      }
    };

    window.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
